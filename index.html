    window.saveExpense = async function(expId) {
      const particulars = $('exp-particulars')?.value?.trim();
      const desc = $('exp-desc')?.value?.trim();
      const amount = parseFloat($('exp-amount')?.value||0);
      const budgetAmount = parseFloat($('exp-budget')?.value||0);
      const date = $('exp-date')?.value;
      if (!particulars) return toast('Particulars is required','error');
      if (!amount || amount <= 0) return toast('Valid expensed amount is required','error');
      if (!budgetAmount || budgetAmount <= 0) return toast('Valid budget/cash advance amount is required','error');
      if (!date) return toast('Date is required','error');
      const payload = {
        particulars,
        description: desc || '',
        expenseType: $('exp-type-sel')?.value || 'RCA',
        amount,
        budgetAmount,
        date,
        reference: $('exp-ref')?.value?.trim()||'',
        notes: $('exp-notes')?.value?.trim()||'',
        status: $('exp-status-sel')?.value || 'Open',
        submittedBy: currentUid(),
        createdAt: expId ? (state.expenses.find(e=>e.id===expId)?.createdAt||serverTimestamp()) : serverTimestamp()
      };
      try {
        if (expId) {
          await updateDoc(doc(db,'expenses',expId), payload);
          toast('Expense updated');
        } else {
          await addDoc(collection(db,'expenses'), payload);
          toast('Expense submitted');
          state.users.filter(u=>u.role==='admin').forEach(u => notify(u.id, `💸 New ${payload.expenseType} expense by ${getUserName(currentUid())}: ₱${amount.toLocaleString()} — ${particulars}`, 'expenses', 'expense'));
        }
        await logActivity('expense', 'Expenses', expId ? 'Edited expense' : 'Added expense: '+particulars);
        closeModal();
      } catch(e) { console.error(e); toast('Failed to save expense','error'); }
    };

    window.viewExpense = function(expId) {
      const e = (state.expenses||[]).find(x=>x.id===expId);
      if (!e) return;
      const isAdmin = state.currentUserDoc?.role === 'admin';
      const uid = currentUid();
      const canEdit = isAdmin || e.submittedBy === uid;
      const budget    = parseFloat(e.budgetAmount||0);
      const expensed  = parseFloat(e.amount||0);
      const remaining = budget - expensed;
      const statusColors = {
        Open:   'bg-orange-50 text-orange-700 border-orange-200',
        Closed: 'bg-green-50 text-green-700 border-green-200',
      };
      showModal(`
        <div class="p-6 border-b border-border flex justify-between items-center bg-muted/30 rounded-t-xl">
          <div class="flex items-center gap-3">
            <span class="px-2.5 py-0.5 rounded-full text-xs font-bold bg-primary/10 text-primary border border-primary/20">${e.expenseType||'RCA'}</span>
            <h3 class="font-bold text-lg">💸 Expense Details</h3>
          </div>
          <button onclick="window.closeModal()" class="text-muted-foreground hover:text-foreground"><i class="fa-solid fa-xmark text-xl"></i></button>
        </div>
        <div class="p-6 space-y-4">
          <div class="flex items-center justify-between">
            <div>
              <h4 class="text-xl font-bold">${e.particulars||'—'}</h4>
              ${e.description ? `<p class="text-sm text-muted-foreground mt-0.5">${e.description}</p>` : ''}
            </div>
            <span class="px-3 py-1 rounded-full text-sm font-bold border ${statusColors[e.status]||statusColors['Open']}">${e.status==='Closed'?'🟢':'🟡'} ${e.status||'Open'}</span>
          </div>
          <!-- Budget tracker -->
          <div class="grid grid-cols-3 gap-3">
            <div class="bg-blue-50 dark:bg-blue-900/20 rounded-xl p-3 border border-blue-200 dark:border-blue-800 text-center">
              <div class="text-xs text-blue-600 dark:text-blue-400 font-semibold mb-1">Budget / Cash Advance</div>
              <div class="font-black text-xl text-blue-600 dark:text-blue-400">₱${budget.toLocaleString('en-US',{minimumFractionDigits:2})}</div>
            </div>
            <div class="bg-red-50 dark:bg-red-900/20 rounded-xl p-3 border border-red-200 dark:border-red-800 text-center">
              <div class="text-xs text-red-600 dark:text-red-400 font-semibold mb-1">Amount Expensed</div>
              <div class="font-black text-xl text-red-500">₱${expensed.toLocaleString('en-US',{minimumFractionDigits:2})}</div>
            </div>
            <div class="bg-${remaining>=0?'green':'red'}-50 dark:bg-${remaining>=0?'green':'red'}-900/20 rounded-xl p-3 border border-${remaining>=0?'green':'red'}-200 dark:border-${remaining>=0?'green':'red'}-800 text-center">
              <div class="text-xs text-${remaining>=0?'green':'red'}-600 font-semibold mb-1">Remaining</div>
              <div class="font-black text-xl text-${remaining>=0?'green-600':'red-500'}">₱${remaining.toLocaleString('en-US',{minimumFractionDigits:2})}</div>
            </div>
          </div>
          <div class="grid grid-cols-2 gap-3 text-sm">
            <div class="bg-muted/40 rounded-xl p-3"><div class="text-xs text-muted-foreground mb-1">Date</div><div class="font-medium">${e.date||'—'}</div></div>
            <div class="bg-muted/40 rounded-xl p-3"><div class="text-xs text-muted-foreground mb-1">Receipt / Reference</div><div class="font-medium">${e.reference||'—'}</div></div>
            <div class="bg-muted/40 rounded-xl p-3 col-span-2"><div class="text-xs text-muted-foreground mb-1">Submitted By</div><div class="flex items-center gap-2">${getUserAvatar(e.submittedBy,'w-6 h-6 text-xs')} ${getUserName(e.submittedBy)}</div></div>
          </div>
          ${e.notes ? `<div class="bg-muted/40 rounded-xl p-3 text-sm"><div class="text-xs text-muted-foreground mb-1">Notes</div>${e.notes}</div>` : ''}
          ${canEdit ? `
          <div class="pt-3 border-t border-border">
            <label class="block text-sm font-semibold mb-2">Update Status</label>
            <div class="flex gap-2">
              <button onclick="window.updateExpenseStatus('${e.id}','Open')" class="flex-1 px-4 py-2 rounded-xl text-sm font-bold border transition-all ${e.status==='Open'||!e.status?'bg-orange-500 text-white border-orange-500':'border-border hover:bg-muted'}">🟡 Open</button>
              <button onclick="window.updateExpenseStatus('${e.id}','Closed')" class="flex-1 px-4 py-2 rounded-xl text-sm font-bold border transition-all ${e.status==='Closed'?'bg-green-500 text-white border-green-500':'border-border hover:bg-muted'}">🟢 Closed (Returned)</button>
            </div>
          </div>` : ''}
          ${canEdit ? `
          <div class="flex gap-2 pt-2">
            <button onclick="closeModal();setTimeout(()=>window.openExpenseModal('${e.id}'),100)" class="flex-1 px-4 py-2 rounded-xl border border-border text-sm font-medium hover:bg-muted">✏️ Edit</button>
            <button onclick="closeModal();window.deleteExpense('${e.id}')" class="px-4 py-2 rounded-xl border border-destructive/30 text-destructive hover:bg-destructive/10 text-sm font-medium">🗑️ Delete</button>
          </div>` : ''}
        </div>
      `);
    };

    window.updateExpenseStatus = async function(expId, status) {
      try {
        await updateDoc(doc(db,'expenses',expId), { status });
        const e = state.expenses.find(x=>x.id===expId);
        if (e) notify(e.submittedBy, `💸 Your ${e.expenseType||''} expense "${e.particulars||e.description}" is now ${status}`, 'expenses', 'expense');
        toast(`Status updated to ${status}`);
        closeModal();
      } catch(e) { toast('Failed to update','error'); }
    };

    window.deleteExpense = async function(id) {
      if (!confirm('Delete this expense?')) return;
      try { await deleteDoc(doc(db,'expenses',id)); toast('Expense deleted'); }
      catch(e) { toast('Failed to delete','error'); }
    };

    window.exportExpensesCSV = function() {
      const rows = [['Date','Type','Particulars','Description','Budget (₱)','Amount Expensed (₱)','Remaining (₱)','Reference','Status','Submitted By','Notes']];
      (state.expenses||[]).forEach(e => {
        const budget = parseFloat(e.budgetAmount||0);
        const expensed = parseFloat(e.amount||0);
        rows.push([e.date||'',e.expenseType||'',e.particulars||'',e.description||'',budget.toFixed(2),expensed.toFixed(2),(budget-expensed).toFixed(2),e.reference||'',e.status||'Open',getUserName(e.submittedBy),e.notes||'']);
      });
      downloadCSV(`expenses_${new Date().toISOString().slice(0,10)}.csv`, rows);
      toast('Expenses exported');
    };

    /***********************
     * CALENDAR MODULE
     ***********************/
    let _calView = 'month';
    let _calDate = new Date();

    function renderCalendar() {
      const html = `
        <div class="max-w-6xl mx-auto space-y-4 animate-slide-in">
          <div class="bg-card border border-border rounded-2xl p-4 flex items-center justify-between shadow-sm">
            <div class="flex items-center gap-3">
              <button onclick="window.calNav(-1)" class="w-9 h-9 rounded-xl border border-border hover:bg-muted flex items-center justify-center transition-colors">‹</button>
              <h3 id="cal-title" class="font-bold text-lg min-w-[200px] text-center"></h3>
              <button onclick="window.calNav(1)" class="w-9 h-9 rounded-xl border border-border hover:bg-muted flex items-center justify-center transition-colors">›</button>
            </div>
            <div class="flex items-center gap-2">
              <div class="flex rounded-xl overflow-hidden border border-border">
                ${['month','week','day'].map(v=>`<button onclick="window.calSetView('${v}')" data-cal-view="${v}" class="px-4 py-2 text-sm font-medium transition-colors ${_calView===v?'bg-primary text-primary-foreground':'bg-background hover:bg-muted'}">${v.charAt(0).toUpperCase()+v.slice(1)}</button>`).join('')}
              </div>
              <button onclick="window.exportCalendarPDF()" class="h-9 px-3 rounded-xl border border-border hover:bg-muted text-xs font-medium">📥 PDF</button>
              <button onclick="window.calGoToday()" class="h-9 px-3 rounded-xl bg-primary text-primary-foreground hover:bg-primary/90 text-xs font-bold">Today</button>
            </div>
          </div>
          <div id="cal-grid"></div>
        </div>
      `;
      $('content-area').innerHTML = html;
      window.renderCalendarGrid();
    }

    window.calNav = function(dir) {
      if (_calView === 'month') _calDate.setMonth(_calDate.getMonth() + dir);
      else if (_calView === 'week') _calDate.setDate(_calDate.getDate() + dir*7);
      else _calDate.setDate(_calDate.getDate() + dir);
      window.renderCalendarGrid();
    };
    window.calGoToday = function() { _calDate = new Date(); window.renderCalendarGrid(); };
    window.calSetView = function(v) {
      _calView = v;
      document.querySelectorAll('[data-cal-view]').forEach(el => {
        el.classList.toggle('bg-primary', el.dataset.calView === v);
        el.classList.toggle('text-primary-foreground', el.dataset.calView === v);
        el.classList.toggle('bg-background', el.dataset.calView !== v);
      });
      window.renderCalendarGrid();
    };

    function getCalendarEvents() {
      const uid = currentUid();
      const events = [];
      // Tasks
      (state.tasks||[]).filter(t => t.dueDate && ((state.currentUserDoc?.role==='admin') || t.assignedTo===uid || (t.assignedToList||[]).includes(uid))).forEach(t => {
        events.push({ date: t.dueDate, title: t.title, color: t.status==='Completed'?'#22c55e':new Date(t.dueDate)<new Date()&&t.status!=='Completed'?'#ef4444':'#3b82f6', type: 'task', id: t.id });
      });
      // Meetings
      (state.meetings||[]).forEach(m => {
        if (m.meetingDate) events.push({ date: m.meetingDate, title: m.title, color: '#06b6d4', type: 'meeting', id: m.id });
      });
      return events;
    }

    window.renderCalendarGrid = function() {
      const titleEl = $('cal-title');
      const grid = $('cal-grid');
      if (!grid) return;
      const events = getCalendarEvents();
      if (_calView === 'month') {
        const y = _calDate.getFullYear(), m = _calDate.getMonth();
        if (titleEl) titleEl.textContent = new Date(y,m,1).toLocaleDateString('en-US',{month:'long',year:'numeric'});
        const firstDay = new Date(y,m,1).getDay();
        const daysInMonth = new Date(y,m+1,0).getDate();
        const today = new Date().toISOString().slice(0,10);
        const days = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
        let html = `<div class="bg-card border border-border rounded-2xl overflow-hidden shadow-sm">
          <div class="grid grid-cols-7 border-b border-border">
            ${days.map(d=>`<div class="p-3 text-center text-xs font-bold text-muted-foreground">${d}</div>`).join('')}
          </div>
          <div class="grid grid-cols-7">`;
        for (let i=0; i<firstDay; i++) html += `<div class="min-h-[100px] border-r border-b border-border/50 p-2 bg-muted/20"></div>`;
        for (let d=1; d<=daysInMonth; d++) {
          const dateStr = `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
          const dayEvents = events.filter(e=>e.date===dateStr);
          const isToday = dateStr === today;
          html += `<div class="min-h-[100px] border-r border-b border-border/50 p-2 ${isToday?'bg-primary/5':''} hover:bg-muted/30 transition-colors">
            <div class="${isToday?'w-7 h-7 rounded-full bg-primary text-primary-foreground flex items-center justify-center text-xs font-bold':'text-xs font-semibold text-foreground'} mb-1">${d}</div>
            <div class="space-y-0.5">
              ${dayEvents.slice(0,3).map(ev=>`<div class="text-[10px] px-1.5 py-0.5 rounded font-medium truncate cursor-pointer text-white" style="background:${ev.color}" onclick="ev.type==='task'?window.openTaskModal('${ev.id}'):window.viewMeeting('${ev.id}')" title="${ev.title}">${ev.title}</div>`).join('')}
              ${dayEvents.length>3?`<div class="text-[10px] text-muted-foreground font-medium pl-1">+${dayEvents.length-3} more</div>`:''}
            </div>
          </div>`;
        }
        html += '</div></div>';
        grid.innerHTML = html;
      } else if (_calView === 'week') {
        const startOfWeek = new Date(_calDate);
        startOfWeek.setDate(_calDate.getDate() - _calDate.getDay());
        const weekDays = [];
        for (let i=0; i<7; i++) {
          const d = new Date(startOfWeek); d.setDate(startOfWeek.getDate()+i);
          weekDays.push(d);
        }
        const today = new Date().toISOString().slice(0,10);
        if (titleEl) titleEl.textContent = `${weekDays[0].toLocaleDateString('en-US',{month:'short',day:'numeric'})} – ${weekDays[6].toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'})}`;
        let html = `<div class="bg-card border border-border rounded-2xl overflow-hidden shadow-sm">
          <div class="grid grid-cols-7 border-b border-border">`;
        weekDays.forEach(d => {
          const isToday = d.toISOString().slice(0,10) === today;
          html += `<div class="p-3 text-center border-r border-border/50 ${isToday?'bg-primary/10':''}">
            <div class="text-xs text-muted-foreground">${d.toLocaleDateString('en-US',{weekday:'short'})}</div>
            <div class="${isToday?'text-primary font-black':'font-bold'} text-lg">${d.getDate()}</div>
          </div>`;
        });
        html += '</div><div class="grid grid-cols-7 min-h-[400px]">';
        weekDays.forEach(d => {
          const dateStr = d.toISOString().slice(0,10);
          const dayEvents = events.filter(e=>e.date===dateStr);
          html += `<div class="border-r border-border/50 p-2 min-h-[400px] hover:bg-muted/20 transition-colors">
            ${dayEvents.map(ev=>`<div class="text-[11px] px-2 py-1.5 rounded-lg font-medium mb-1 cursor-pointer text-white" style="background:${ev.color}" onclick="ev.type==='task'?window.openTaskModal('${ev.id}'):window.viewMeeting('${ev.id}')">${ev.title}</div>`).join('')}
          </div>`;
        });
        html += '</div></div>';
        grid.innerHTML = html;
      } else {
        const dateStr = _calDate.toISOString().slice(0,10);
        if (titleEl) titleEl.textContent = _calDate.toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric',year:'numeric'});
        const dayEvents = events.filter(e=>e.date===dateStr);
        let html = `<div class="bg-card border border-border rounded-2xl p-6 shadow-sm">
          ${dayEvents.length ? `<div class="space-y-3">
            ${dayEvents.map(ev=>`<div class="flex items-center gap-3 p-4 rounded-xl border border-border hover:bg-muted/30 cursor-pointer transition-colors" onclick="ev.type==='task'?window.openTaskModal('${ev.id}'):window.viewMeeting('${ev.id}')">
              <div class="w-3 h-3 rounded-full" style="background:${ev.color}"></div>
              <div>
                <div class="font-semibold">${ev.title}</div>
                <div class="text-xs text-muted-foreground">${ev.type.charAt(0).toUpperCase()+ev.type.slice(1)}</div>
              </div>
            </div>`).join('')}
          </div>` : '<div class="text-center py-16 text-muted-foreground"><div class="text-4xl mb-3">🗓️</div><p class="font-medium">No events on this day</p></div>'}
        </div>`;
        grid.innerHTML = html;
      }
    };

      toast('PDF export requires print — use Ctrl+P to print the calendar','info');
      window.print();
    };

            <div class="col-span-2">
              <label class="block text-sm font-semibold mb-1">Description</label>
              <textarea id="rt-desc" rows="2" class="w-full px-3 py-2 rounded-xl border border-input bg-background text-sm resize-none"></textarea>
            </div>
            <div>
              <label class="block text-sm font-semibold mb-1">Frequency *</label>
              <select id="rt-freq" class="w-full h-10 px-3 rounded-xl border border-input bg-background text-sm">
                <option value="daily">Daily</option>
                <option value="weekly">Weekly</option>
                <option value="biweekly">Bi-Weekly</option>
                <option value="monthly">Monthly</option>
              </select>
            </div>
            <div>
              <label class="block text-sm font-semibold mb-1">Day of Week (Weekly)</label>
              <select id="rt-day" class="w-full h-10 px-3 rounded-xl border border-input bg-background text-sm">
                ${['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'].map((d,i)=>`<option value="${i}">${d}</option>`).join('')}
              </select>
            </div>
            <div>
              <label class="block text-sm font-semibold mb-1">Assign To *</label>
              <select id="rt-assign" class="w-full h-10 px-3 rounded-xl border border-input bg-background text-sm">
                ${state.users.filter(u=>u.status!=='inactive').map(u=>`<option value="${u.id}">${u.name||u.email}</option>`).join('')}
              </select>
            </div>
            <div>
              <label class="block text-sm font-semibold mb-1">Priority</label>
              <select id="rt-priority" class="w-full h-10 px-3 rounded-xl border border-input bg-background text-sm">
                ${['Low','Medium','High'].map(p=>`<option value="${p}" ${p==='Medium'?'selected':''}>${p}</option>`).join('')}
              </select>
            </div>
            <div>
              <label class="block text-sm font-semibold mb-1">Task Type</label>
              <select id="rt-type" class="w-full h-10 px-3 rounded-xl border border-input bg-background text-sm">
                ${taskTypes.map(t=>`<option value="${t}">${t}</option>`).join('')}
              </select>
            </div>
            <div>
              <label class="block text-sm font-semibold mb-1">Start Date *</label>
              <input id="rt-start" type="date" value="${new Date().toISOString().slice(0,10)}" class="w-full h-10 px-3 rounded-xl border border-input bg-background text-sm">
            </div>
          </div>
        </div>
        <div class="p-6 border-t border-border bg-muted/30 rounded-b-xl flex justify-end gap-3">
          <button onclick="window.closeModal()" class="px-4 py-2 rounded-xl border border-input bg-background hover:bg-muted text-sm font-medium">Cancel</button>
          <button onclick="window.saveRecurringTask()" class="px-5 py-2 rounded-xl bg-primary text-primary-foreground hover:bg-primary/90 text-sm font-bold">Create Template</button>
        </div>
      `);
    };

    window.saveRecurringTask = async function() {
      const title = $('rt-title')?.value?.trim();
      if (!title) return toast('Title is required','error');
      const startDate = $('rt-start')?.value;
      if (!startDate) return toast('Start date is required','error');
      try {
        await addDoc(collection(db,'recurring_tasks'), {
          title, description: $('rt-desc')?.value?.trim()||'',
          frequency: $('rt-freq')?.value||'weekly',
          dayOfWeek: parseInt($('rt-day')?.value||0),
          assignedTo: $('rt-assign')?.value||'',
          priority: $('rt-priority')?.value||'Medium',
          taskType: $('rt-type')?.value||'Internal',
          startDate, nextRun: startDate,
          active: true, createdBy: currentUid(), createdAt: serverTimestamp()
        });
        closeModal(); toast('🔄 Recurring task template created!');
      } catch(e) { console.error(e); toast('Failed to create','error'); }
    };

    window.toggleRecurringTask = async function(id, active) {
      try { await updateDoc(doc(db,'recurring_tasks',id), {active}); toast(active?'Task resumed':'Task paused'); }
      catch(e) { toast('Failed to update','error'); }
    };
    window.deleteRecurringTask = async function(id) {
      if (!confirm('Delete this recurring task template?')) return;
      try { await deleteDoc(doc(db,'recurring_tasks',id)); toast('Template deleted'); }
      catch(e) { toast('Failed to delete','error'); }
    };

    /***********************
     * MY SETTINGS MODULE
     ***********************/
    function renderMySettings() {
      const u = state.currentUserDoc || {};
      const palettes = [
        {name:'Default Blue', primary:'221.2 83.2% 53.3%', label:'🔵'},
        {name:'Purple', primary:'270 95% 60%', label:'🟣'},
        {name:'Green', primary:'142 70% 45%', label:'🟢'},
        {name:'Orange', primary:'25 95% 55%', label:'🟠'},
        {name:'Rose', primary:'345 82% 55%', label:'🌹'},
        {name:'Teal', primary:'172 66% 50%', label:'🩵'},
      ];
      const savedPalette = localStorage.getItem('sda_palette')||'Default Blue';
      const html = `
        <div class="max-w-2xl mx-auto space-y-6 animate-slide-in">
          <!-- Profile Card -->
          <div class="bg-card border border-border rounded-2xl p-6 shadow-sm">
            <h3 class="font-bold text-lg mb-5">👤 My Profile</h3>
            <div class="flex items-center gap-4 mb-6">
              ${getUserAvatar(currentUid(), 'w-16 h-16 text-xl border-2 border-border')}
              <div>
                <p class="font-bold text-lg">${u.name||'User'}</p>
                <p class="text-sm text-muted-foreground">${u.email||''}</p>
                <span class="text-xs px-2 py-0.5 rounded-full bg-primary/10 text-primary font-semibold">${u.role||'user'}</span>
              </div>
            </div>
            <div class="space-y-4">
              <div>
                <label class="block text-sm font-semibold mb-1">Display Name / Nickname</label>
                <input id="set-name" value="${u.name||''}" class="w-full h-10 px-3 rounded-xl border border-input bg-background text-sm focus:outline-none focus:ring-2 focus:ring-ring">
                <p class="text-xs text-muted-foreground mt-1">This name will appear across all modules</p>
              </div>
            </div>
          </div>

          <!-- Password Card -->
          <div class="bg-card border border-border rounded-2xl p-6 shadow-sm">
            <h3 class="font-bold text-lg mb-5">🔑 Change Password</h3>
            <div class="space-y-3">
              <div>
                <label class="block text-sm font-semibold mb-1">Current Password</label>
                <input id="set-old-pw" type="password" class="w-full h-10 px-3 rounded-xl border border-input bg-background text-sm" placeholder="Enter current password">
              </div>
              <div>
                <label class="block text-sm font-semibold mb-1">New Password</label>
                <input id="set-new-pw" type="password" class="w-full h-10 px-3 rounded-xl border border-input bg-background text-sm" placeholder="Enter new password">
              </div>
              <div>
                <label class="block text-sm font-semibold mb-1">Confirm New Password</label>
                <input id="set-confirm-pw" type="password" class="w-full h-10 px-3 rounded-xl border border-input bg-background text-sm" placeholder="Confirm new password">
              </div>
            </div>
          </div>

          <!-- Color Palette -->
          <div class="bg-card border border-border rounded-2xl p-6 shadow-sm">
            <h3 class="font-bold text-lg mb-4">🎨 Color Theme</h3>
            <div class="grid grid-cols-3 gap-3">
              ${palettes.map(p => `
                <button onclick="window.applyPalette('${p.name}','${p.primary}')"
                  class="p-3 rounded-xl border-2 transition-all flex flex-col items-center gap-2 ${savedPalette===p.name?'border-primary bg-primary/5':'border-border hover:border-primary/50'}">
                  <span class="text-2xl">${p.label}</span>
                  <div class="w-full h-3 rounded-full" style="background:hsl(${p.primary})"></div>
                  <span class="text-xs font-semibold">${p.name}</span>
                </button>`).join('')}
            </div>
          </div>

          <!-- Save Button -->
          <button onclick="window.saveMySettings()" class="w-full h-12 bg-primary text-primary-foreground rounded-2xl font-bold text-base shadow hover:bg-primary/90 transition-all">
            💾 Save Settings
          </button>
        </div>
      `;
      $('content-area').innerHTML = html;
    }

    window.applyPalette = function(name, primary) {
      document.documentElement.style.setProperty('--primary', primary);
      document.documentElement.style.setProperty('--ring', primary);
      localStorage.setItem('sda_palette', name);
      localStorage.setItem('sda_primary', primary);
      renderMySettings();
      toast('🎨 Theme applied!');
    };

    // Apply saved palette on boot
    (function() {
      const saved = localStorage.getItem('sda_primary');
      if (saved) {
        document.documentElement.style.setProperty('--primary', saved);
        document.documentElement.style.setProperty('--ring', saved);
      }
    })();

    window.saveMySettings = async function() {
      const name = $('set-name')?.value?.trim();
      const oldPw = $('set-old-pw')?.value||'';
      const newPw = $('set-new-pw')?.value||'';
      const confirmPw = $('set-confirm-pw')?.value||'';
      const uid = currentUid();
      if (!name) return toast('Display name is required','error');

      const updates = { name };

      if (newPw) {
        if (state.currentUserDoc?.password !== oldPw) return toast('Current password is incorrect','error');
        if (newPw !== confirmPw) return toast('Passwords do not match','error');
        if (newPw.length < 4) return toast('Password must be at least 4 characters','error');
        updates.password = newPw;
      }

      try {
        await updateDoc(doc(db,'users',uid), updates);
        // Update local state
        state.currentUserDoc = { ...state.currentUserDoc, ...updates };
        localStorage.setItem('sda_user', JSON.stringify(state.currentUserDoc));
        updateUserHeader();
        toast('✅ Settings saved!');
        if (newPw) toast('🔑 Password updated successfully!','info');
        await logActivity('settings', 'My Settings', 'Updated profile settings');
      } catch(e) { console.error(e); toast('Failed to save settings','error'); }
    };

    /***********************
     * ACTIVITY LOGS (Admin)
     ***********************/
    function renderActivityLogs() {
      const isAdmin = state.currentUserDoc?.role === 'admin';
      if (!isAdmin) return navigate('home');
      const logs = state.activityLogs || [];
      const html = `
        <div class="max-w-5xl mx-auto space-y-5 animate-slide-in">
          <div class="flex justify-between items-center">
            <div>
              <h3 class="font-bold text-xl">📋 Activity Logs</h3>
              <p class="text-sm text-muted-foreground">${logs.length} activities recorded</p>
            </div>
            <button onclick="window.exportLogsCSV()" class="h-9 px-4 bg-primary text-primary-foreground rounded-lg text-sm font-bold hover:bg-primary/90">📥 Export CSV</button>
          </div>
          <div class="bg-card border border-border rounded-2xl shadow-sm overflow-hidden">
            <div class="overflow-x-auto">
              <table class="w-full text-sm">
                <thead class="bg-muted/40 text-xs text-muted-foreground uppercase border-b border-border">
                  <tr>
                    <th class="px-5 py-3 text-left">User</th>
                    <th class="px-5 py-3 text-left">Action</th>
                    <th class="px-5 py-3 text-left">Module</th>
                    <th class="px-5 py-3 text-left">Details</th>
                    <th class="px-5 py-3 text-left">Time</th>
                  </tr>
                </thead>
                <tbody class="divide-y divide-border">
                  ${logs.slice(0,200).map(l=>`
                    <tr class="hover:bg-muted/30">
                      <td class="px-5 py-3 font-medium text-sm">${l.userName||getUserName(l.userId)||'User'}</td>
                      <td class="px-5 py-3"><span class="px-2 py-0.5 rounded-full text-xs font-semibold bg-muted border border-border">${l.action||'—'}</span></td>
                      <td class="px-5 py-3 text-sm text-muted-foreground">${l.module||'—'}</td>
                      <td class="px-5 py-3 text-xs text-muted-foreground max-w-[200px] truncate">${l.details||''}</td>
                      <td class="px-5 py-3 text-xs text-muted-foreground">${timeAgo(l.createdAt)}</td>
                    </tr>`).join('')||'<tr><td colspan="5" class="px-5 py-8 text-center text-muted-foreground">No activity logs yet</td></tr>'}
                </tbody>
              </table>
            </div>
          </div>
        </div>
      `;
      $('content-area').innerHTML = html;
    }

    window.exportLogsCSV = function() {
      const rows = [['User','Action','Module','Details','Time']];
      (state.activityLogs||[]).forEach(l => {
        rows.push([l.userName||getUserName(l.userId)||'',l.action||'',l.module||'',l.details||'',l.createdAt?.toDate?l.createdAt.toDate().toLocaleString():'']);
      });
      downloadCSV(`activity_logs_${new Date().toISOString().slice(0,10)}.csv`, rows);
      toast('Logs exported');
    };

(async function boot() {
      try {
        await ensureSettings();       // Ensure global settings doc
        await initializeAuthSystem(); // Ensure default admin user (seeding only; no hint on UI)
        await ensureCollections();    // Initialize base collections (placeholders filtered)

        // Restore session
        const persisted = localStorage.getItem('sda_user');
        if (persisted) {
          try {
            const u = JSON.parse(persisted);
            if (u && u.id && u.email) {
              state.currentUserDoc = u;
              state.currentUser = { uid: u.id };
              document.body.classList.remove('unauth');
              updateUserHeader();
              renderSidebar();
              await initAppData();
              navigate('home');
              // Quiz reminders after short delay
              setTimeout(() => checkQuizReminders(), 3000);
              return;
            }
          } catch {}
        }

        // Show login by default
        document.body.classList.add('unauth');
        renderSidebar(); // still renders but won't be visible in unauth state
        renderLoginPage();
      } catch (e) {
        console.error(e);
        toast("Failed to initialize app", "error");
      }
    })();

  </script>
</body>
</html>

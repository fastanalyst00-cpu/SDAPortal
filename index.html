    function showModal(contentHtml) {
      const overlay = $('modal-overlay');

      modal.innerHTML = contentHtml;
      overlay.classList.remove('hidden');
      void overlay.offsetWidth;
      overlay.classList.remove('opacity-0');
      modal.classList.remove('scale-95');
      modal.classList.add('scale-100');
    }
    function closeModal() {
      const overlay = $('modal-overlay');
      const modal = $('modal-content');
      overlay.classList.add('opacity-0');
      modal.classList.remove('scale-100');
      modal.classList.add('scale-95');
      setTimeout(() => overlay.classList.add('hidden'), 200);
    }
    window.closeModal = closeModal;

    function toast(message, type = 'success') {
      const container = $('toast-container');
      const el = document.createElement('div');
      const colors = { success: 'bg-green-500', error: 'bg-red-500', info: 'bg-blue-500', warning: 'bg-yellow-500' };
      const icons = { success: 'fa-check-circle', error: 'fa-exclamation-circle', info: 'fa-info-circle', warning: 'fa-exclamation-triangle' };
      el.className = `${colors[type]} text-white px-4 py-3 rounded-lg shadow-lg flex items-center gap-3 min-w-[300px] transform translate-x-full transition-transform duration-300 pointer-events-auto`;
      el.innerHTML = `<i class="fa-solid ${icons[type]}"></i><span class="font-medium text-sm">${message}</span>`;
      container.appendChild(el);
      requestAnimationFrame(() => el.classList.remove('translate-x-full'));
      setTimeout(() => { el.classList.add('translate-x-full'); setTimeout(() => el.remove(), 300); }, 3000);
    }
    function formatDate(dateString) {
      if (!dateString) return '—';
      const d = (dateString?.toDate?.()) ? dateString.toDate() : new Date(dateString);
      if (isNaN(d.getTime())) return '—';
      const now = new Date();
      const diffMs = now - d;
      const diffDays = Math.floor(diffMs / (1000 * 60 * 60 * 24));
      if (diffDays === 0) return 'Today';
      if (diffDays === 1) return 'Yesterday';
      if (diffDays < 7) return `${diffDays} days ago`;
      return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
    }
    function timeAgo(dateVal) {
      const d = (dateVal?.toDate?.()) ? dateVal.toDate() : new Date(dateVal);
      if (isNaN(d.getTime())) return '';
      const now = new Date();
      const seconds = Math.floor((now - d) / 1000);
      let interval = seconds / 31536000;
      if (interval > 1) return Math.floor(interval) + ' years ago';
      interval = seconds / 2592000;
      if (interval > 1) return Math.floor(interval) + ' months ago';
      interval = seconds / 86400;
      if (interval > 1) return Math.floor(interval) + ' days ago';
      interval = seconds / 3600;
      if (interval > 1) return Math.floor(interval) + ' hours ago';
      interval = seconds / 60;
      if (interval > 1) return Math.floor(interval) + ' minutes ago';
      return 'Just now';
    }
    function getStatusColor(status) {
      const colors = {
        'Open': 'bg-blue-500',
        'In Progress': 'bg-yellow-500',

        'Closed': 'bg-gray-500',
        'Pending': 'bg-orange-500'
      };

    }
    function getPriorityColor(priority) {
      const colors = { 'Low': 'bg-blue-400', 'Medium': 'bg-yellow-400', 'High': 'bg-red-500' };
      return colors[priority] || 'bg-gray-400';
    }
    function getStatusBadgeClass(status) {
      const classes = {

        'In Progress': 'bg-yellow-50 text-yellow-700 border-yellow-200 dark:bg-yellow-900/30 dark:text-yellow-300',

        'Completed': 'bg-green-50 text-green-700 border-green-200 dark:bg-green-900/30 dark:text-green-300',

        'Pending': 'bg-orange-50 text-orange-700 border-orange-200 dark:bg-orange-900/30 dark:text-orange-300'
      };
      return classes[status] || 'bg-gray-50 text-gray-700 border-gray-200';
    }

    function getUserById(uid) {
      return state.users.find(u => u.id === uid) || null;
    }
    function getUserName(uid) {
      const u = getUserById(uid);
      return u ? (u.name || u.email || 'Unknown') : 'Unknown';
    }
    function getUserAvatar(uid, classes='') {
      const u = getUserById(uid);
      if (!u) return `<div class="${classes} rounded-full bg-gray-300 flex items-center justify-center text-xs font-bold">?</div>`;
      const initials = (u.name || u.email || '?')
        .split(' ')
        .map(n => n[0])
        .join('')
        .slice(0,2)
        .toUpperCase();
      const colors = ['bg-blue-500','bg-green-500','bg-purple-500','bg-orange-500','bg-pink-500'];
      const colorIndex = (uid||'x').charCodeAt(0) % colors.length;
      return `<div class="${classes} rounded-full ${colors[colorIndex]} text-white flex items-center justify-center font-bold">${initials}</div>`;
    }
    function getProjectName(pid) {
      if (!pid) return 'Rate Task';
      const p = state.projects.find(p => p.id === pid);
      return p ? p.name : 'Rate Task';
    }

      return state.currentUser?.uid || state.currentUserDoc?.id || null;

    /** Safe mapping for user objects to avoid missing fields */
    function safeUser(user) {
      return {
        id: user.id || "",
        email: user.email || "",
        password: user.password || "",
        name: user.name || "User",
        role: user.role || "staff",
        status: user.status || "active",
        createdAt: user.createdAt || "",
      };
    }
    function mapUsersSnapshot(snap) {
      return snap.docs.map((d) => safeUser({ id: d.id, ...d.data() }));
    }

    /** Login */
    async function loginUser() {
      const email = document.getElementById("login-email").value.trim();
      const password = document.getElementById("login-password").value;

      if (!email || !password) {
        toast("Enter username and password", "error");
        return;
      }

      try {
        const q1 = query(collection(db, "users"), where("email", "==", email));
        const snap = await getDocs(q1);

        if (snap.empty) {
          toast("User not found", "error");
          return;
        }
        const docSnap = snap.docs[0];
        const user = safeUser({ id: docSnap.id, ...docSnap.data() });

        if (user.password !== password) {
          toast("Invalid password", "error");
          return;
        }
        if (user.status === "inactive") {
          toast("Account is inactive", "warning");
          return;
        }

        currentUser = user;
        state.currentUserDoc = user;
        state.currentUser = { uid: user.id }; // shim

        // Persist session
        localStorage.setItem('sda_user', JSON.stringify(user));

        document.body.classList.remove('unauth');
        updateUserHeader();
        renderSidebar();
        await initAppData();
        navigate("home");
        toast(`Welcome back, ${user.name || "user"}! 👋`, "info");
        await logActivity('login', 'Auth', 'User logged in');
        setTimeout(() => checkQuizReminders(), 3000);
      } catch (e) {
        console.error(e);
        toast("Login failed", "error");
      }
    }
    window.loginUser = loginUser;

    /** Logout */
    function logoutUser() {
      currentUser = null;
      state.currentUserDoc = null;
      state.currentUser = null;

      // Reset caches and listeners
      state.listeners.forEach((u) => u && u());
      state.listeners = [];
      state.users = [];
      state.tasks = [];
      state.projects = [];
      state.announcements = [];
      state.rates = [];
      state.quizzes = [];
      state.quizResults = [];
      state.notifications = [];
      state.learning = [];

      localStorage.removeItem('sda_user');

      updateNotificationBadge();
      updateUserHeader();
      renderSidebar();
      renderLoginPage();
    }

    function buildNotifItem(n) {
      const meta = NOTIF_META[n.type] || NOTIF_META.info;
      const url = n.url || '';
      const isNew = !n.read;
      return `
        <div class="flex items-start gap-3 px-3 py-2.5 rounded-xl cursor-pointer transition-all ${isNew ? 'bg-primary/8 border border-primary/20 shadow-sm' : 'hover:bg-muted/60 opacity-75 hover:opacity-100'}" data-id="${n.id}" data-url="${url}">

            <div class="w-9 h-9 rounded-full ${meta.color} flex items-center justify-center text-base">${meta.emoji}</div>
            ${isNew ? '<span class="absolute -top-0.5 -right-0.5 w-2.5 h-2.5 rounded-full bg-primary border-2 border-background animate-pulse"></span>' : '<span class="absolute -top-0.5 -right-0.5 w-2 h-2 rounded-full bg-muted-foreground/30 border border-background"></span>'}
          </div>
          <div class="flex-1 min-w-0">
            <div class="flex items-center gap-1.5 mb-0.5">
              <span class="text-[10px] font-bold uppercase tracking-wide ${meta.color} px-1.5 py-0.5 rounded">${meta.label}</span>
              ${isNew ? '<span class="text-[9px] font-bold bg-primary text-primary-foreground px-1.5 py-0.5 rounded-full uppercase tracking-wide">NEW</span>' : ''}
            </div>
            <div class="text-xs leading-snug ${isNew ? 'text-foreground font-medium' : 'text-foreground/70'}">${n.text || ''}</div>
            <div class="text-[10px] text-muted-foreground mt-1 flex items-center gap-1">
              🕐 ${timeAgo(n.date)}${url ? ' · <span class="text-primary font-medium">tap to view</span>' : ''}
            </div>
          </div>
        </div>
      `;
    }
    function openNotifDrawer() {
      $('notif-drawer').classList.remove('translate-x-full');
      renderNotifList(); // refresh on open
    }
    function closeNotifDrawer() {
      $('notif-drawer').classList.add('translate-x-full');
    }
    function renderNotifList() {
      const list = $('notif-list');
      const notifs = state.notifications || [];
      const newCount = notifs.filter(n => !n.read).length;
      // Separator: new first, then read
      const newNotifs = notifs.filter(n => !n.read);
      const readNotifs = notifs.filter(n => n.read);
      let html = '';
      if (newNotifs.length) {
        html += `<div class="px-3 py-1.5 text-[10px] font-bold text-primary uppercase tracking-widest">🔔 New (${newNotifs.length})</div>`;
        html += newNotifs.map(buildNotifItem).join('');
      }
      if (readNotifs.length) {
        html += `<div class="px-3 py-1.5 text-[10px] font-bold text-muted-foreground uppercase tracking-widest mt-2">✓ Earlier</div>`;
        html += readNotifs.map(buildNotifItem).join('');
      }
      list.innerHTML = html || `<div class="text-sm text-muted-foreground p-8 text-center">🔔<br>No notifications yet</div>`;
      list.querySelectorAll('[data-id]').forEach(el => {
        el.addEventListener('click', async () => {
          const id = el.getAttribute('data-id');
          const url = el.getAttribute('data-url');
          try { await updateDoc(doc(db, 'notifications', id), { read: true }); } catch(e) {}
          if (url) {
            closeNotifDrawer();
            try {
              const colonIdx = url.indexOf(':');
              const view = colonIdx > -1 ? url.slice(0, colonIdx) : url;
              const arg = colonIdx > -1 ? url.slice(colonIdx + 1) : '';
              navigate(view);
              setTimeout(() => {
                if (arg) {
                  if (view === 'tasks') openTaskModal(arg);
                  if (view === 'announcements') viewAnnouncement(arg);
                  if (view === 'projects') viewProject(arg);
                  if (view === 'learning') viewLearning(arg);
                  if (view === 'expenses') viewExpense(arg);
                  if (view === 'quizzes') {} // just navigate
                }
              }, 150);
            } catch(e){ console.error(e); }
          }
        });
      });
    }
    async function markNotificationsRead() {
      const uid = currentUid();
      if (!uid) return;
      try {
        const snap = await getDocs(query(collection(db, 'notifications'), where('userId','==', uid), where('read','==', false)));
        for (const d of snap.docs) {
          await updateDoc(doc(db, 'notifications', d.id), { read: true });
        }
      } catch (e) { console.error(e); }
    }
    async function logActivity(action, module, details='') {
      const uid = currentUid();
      if (!uid) return;
      try {
        await addDoc(collection(db,'activity_logs'), {
          userId: uid,
          userName: state.currentUserDoc?.name || 'User',
          action, module, details,
          createdAt: serverTimestamp()
        });
      } catch(e) {}
    }
    function updateNotificationBadge() {
      const dot = $('notif-dot');
      const total = (state.notifications || []).length;
      const unread = state.notifications.filter(n => !n.read).length;
      // Always show badge (total count), pulse red when unread
      if (dot) {
        dot.textContent = unread > 9 ? '9+' : (unread || total > 0 ? (unread || '') : '');
        dot.classList.toggle('hidden', total === 0);
        dot.classList.toggle('bg-red-500', unread > 0);
        dot.classList.toggle('bg-muted-foreground/50', unread === 0);
        dot.classList.toggle('animate-bounce', unread > 0);
      }
      const countEl = $('notif-unread-count');
      if (countEl) {
        countEl.textContent = unread > 0 ? unread + ' new' : total + ' total';
        countEl.classList.toggle('hidden', total === 0);
        countEl.classList.toggle('text-primary', unread > 0);
        countEl.classList.toggle('text-muted-foreground', unread === 0);
      }
    }
    async function notify(userId, text, url=null, type='info') {
      if (!userId) return;
      try {
        await addDoc(collection(db, 'notifications'), {
          userId,
          text,
          url,   // e.g., 'tasks:taskId' or 'announcements:postId'
          type,
          read: false,
          date: serverTimestamp()
        });
      } catch (e) { console.error(e); }
    }

    function renderSidebar() {
      const isAdmin = state.currentUserDoc?.role === 'admin';
      const items = [
        { id: 'home', icon: 'fa-house', label: 'Home', emoji: '🏠' },
        { id: 'kanban', icon: 'fa-columns', label: 'Task Board', emoji: '📋' },
        { id: 'tasks', icon: 'fa-list-check', label: 'All Tasks', emoji: '✅' },
        { id: 'projects', icon: 'fa-diagram-project', label: 'Projects', emoji: '📁' },
        { id: 'announcements', icon: 'fa-bullhorn', label: 'Team Feed', emoji: '📢' },
        { id: 'learning', icon: 'fa-graduation-cap', label: 'Learning Hub', emoji: '🎓' },
        { id: 'rates', icon: 'fa-file-invoice-dollar', label: 'Rates', emoji: '💰' },
        { id: 'quizzes', icon: 'fa-square-check', label: 'Quizzes', emoji: '🧠' },
        { id: 'meetings', icon: 'fa-calendar', label: 'Meetings', emoji: '📅' },

          { id: 'admin', icon: 'fa-shield-halved', label: 'Admin', emoji: '⚙️' },

      const nav = $('sidebar-nav');
      nav.innerHTML = items.map(item => `
        <button onclick="window.navigate('${item.id}')" data-view="${item.id}" class="nav-item w-full flex items-center gap-3 px-3 py-2.5 rounded-md text-sm font-medium transition-colors text-muted-foreground hover:bg-muted mb-0.5">
          <span class="text-base w-5 text-center leading-none">${item.emoji}</span>
          ${item.label}
        </button>
      `).join('');
      // Add settings/profile link at top
      if (state.currentUserDoc) {
        nav.insertAdjacentHTML('beforeend', `
          <div class="border-t border-border mt-2 pt-2">
            <button onclick="window.navigate('my-settings')" data-view="my-settings" class="nav-item w-full flex items-center gap-3 px-3 py-2.5 rounded-md text-sm font-medium transition-colors text-muted-foreground hover:bg-muted mb-0.5">
              <span class="text-base w-5 text-center leading-none">⚙️</span>
              My Settings
            </button>
          </div>
        `);
      }
      // Set active
      document.querySelectorAll('.nav-item').forEach(el => {
        if (el.dataset.view === state.view) {
          el.classList.add('bg-primary/10', 'text-primary', 'border-r-2', 'border-primary');
          el.classList.remove('text-muted-foreground', 'hover:bg-muted');
        }
      });

    window.navigate = function(view, silent=false) {
      // Admin guard
      if (['users','settings','admin','admin-users','admin-settings','admin-reports','admin-quizzes','admin-learning'].includes(view)) {
        if (state.currentUserDoc?.role !== 'admin') {
          toast('Admin access only', 'warning');
          view = 'home';
        }
      }

      state.view = view;
      const titleMap = {
        'home': 'Homepage',
        'tasks': 'Task Management',
        'kanban': 'Task Board',
        'projects': 'Projects',
        'announcements': 'Team Feed',
        'learning': 'Learning Hub',
        'rates': 'Rate Uploads',
        'users': 'User Management',
        'reports': 'Reports',
        'settings': 'Global Settings',
        'quizzes': 'Quizzes',
        'profile': 'My Profile',
        'admin': 'Admin Panel',
        'admin-users': 'Admin › Users',
        'admin-settings': 'Admin › Settings',
        'admin-reports': 'Admin › Reports',
        'admin-quizzes': 'Admin › Quiz Management',
        'meetings': '📅 Meetings',
        'admin-learning': 'Admin › Learning Hub',
        'my-notes': '📓 My Notes',
        'expenses': '💸 Expense Tracking',
        'calendar': '🗓️ Calendar',
        'my-settings': '⚙️ My Settings',
        'recurring-tasks': '🔄 Recurring Tasks',
        'activity-logs': '📋 Activity Logs',
      };
      $('page-title').textContent = titleMap[view] || 'Portal';
      const contentArea = $('content-area');
      contentArea.innerHTML = '';
      contentArea.scrollTop = 0;

      if (!silent) {
        document.querySelectorAll('.nav-item').forEach(el => {
          const isAdmin = view.startsWith('admin');
          if (el.dataset.view === view || (isAdmin && el.dataset.view === 'admin')) {
            el.classList.add('bg-primary/10', 'text-primary', 'border-r-2', 'border-primary');
            el.classList.remove('text-muted-foreground', 'hover:bg-muted');
          } else {
            el.classList.remove('bg-primary/10', 'text-primary', 'border-r-2', 'border-primary');
            el.classList.add('text-muted-foreground', 'hover:bg-muted');
          }
        });
      }

      switch(view) {
        case 'home': renderHome(); break;
        case 'tasks': renderTaskList(); break;
        case 'kanban': renderKanban(); break;
        case 'projects': renderProjects(); break;
        case 'announcements': renderAnnouncements(); break;
        case 'learning': renderLearning(); break;
        case 'rates': renderRates(); break;
        case 'users': renderUsers(); break;
        case 'reports': renderReports(); break;
        case 'settings': renderSettings(); break;
        case 'quizzes': renderQuizzes(); break;
        case 'profile': renderProfile(); break;
        case 'admin': renderAdmin(); break;
        case 'admin-users': renderAdminUsers(); break;
        case 'admin-settings': renderAdminSettings(); break;
        case 'admin-reports': renderAdminReports(); break;
        case 'admin-quizzes': renderAdminQuizzes(); break;
        case 'meetings': renderMeetings(); break;
        case 'admin-learning': renderAdminLearning(); break;
        case 'my-notes': renderMyNotes(); break;
        case 'expenses': renderExpenses(); break;
        case 'calendar': renderCalendar(); break;
        case 'my-settings': renderMySettings(); break;
        case 'recurring-tasks': renderRecurringTasks(); break;
        case 'activity-logs': renderActivityLogs(); break;
        default: renderHome();
      }
    };

    /***********************
     * HOMEPAGE
     ***********************/

                      <span class="shrink-0 px-2 py-0.5 rounded-full text-[10px] font-semibold border ${getStatusBadgeClass(task.status)}">${task.status}</span>

                  </button>
                  <button onclick="navigate('learning')" class="flex flex-col items-center gap-1.5 p-3 rounded-xl bg-green-50 dark:bg-green-900/20 text-green-700 dark:text-green-300 hover:scale-105 transition-transform text-xs font-semibold">

              </div>

          </div>` : ''}

      $('content-area').innerHTML = html;

      // Chart init
      const ctx = document.getElementById('dashboardChart').getContext('2d');
      const statuses = state.settings.statuses || ['Open','In Progress','For Review','Completed','Closed'];
      const statusCounts = statuses.map(s => state.tasks.filter(t => t.status === s).length);
      if (state.charts['home']) { state.charts['home'].destroy(); }
      state.charts['home'] = new Chart(ctx, {
        type: 'doughnut',
        data: {
          labels: statuses,
          datasets: [{ data: statusCounts, backgroundColor: ['#3b82f6','#f59e0b','#8b5cf6','#22c55e','#64748b'], borderWidth: 0 }]
        },
        options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'right', labels: { usePointStyle: true, boxWidth: 8 } } }, cutout: '70%' }
      });
      document.getElementById('chart-type').addEventListener('change', (e) => {
        const type = e.target.value;
        state.charts['home'].config.type = type;
        state.charts['home'].update();
      });
    }

    function homeCard(title, value, icon, colorClass, onClick) {
      const id = 'card-' + Math.random().toString(36).slice(2);
      setTimeout(() => {
        const el = document.getElementById(id);
        el?.addEventListener('click', () => onClick && onClick());
      });
      // title may start with emoji
      return `
        <div id="${id}" class="bg-card border border-border rounded-2xl p-5 shadow-sm hover:shadow-lg transition-all cursor-pointer group">
          <div class="flex items-center gap-3 mb-3">
            <div class="w-10 h-10 rounded-xl ${colorClass} flex items-center justify-center shadow-md">
              <i class="fa-solid ${icon} text-white text-sm"></i>
            </div>
          </div>
          <h3 class="text-2xl font-bold group-hover:text-primary transition-colors">${value}</h3>
          <p class="text-sm text-muted-foreground mt-0.5">${title}</p>
        </div>
      `;
    }

    /***********************
     * Reusable Multi-Select (Modern)
     ***********************/
    window.__ms = {};
    function initMultiSelect(key, mountId, options, selected = [], placeholder = 'Select...', search = true, renderOptionFn = null) {
      window.__ms[key] = selected.slice();
      const mount = $(mountId);
      mount.innerHTML = `
        <div class="relative">
          <div id="${key}-control" class="min-h-[40px] px-2 py-1 rounded-md border border-input bg-background flex items-center gap-2 flex-wrap cursor-pointer">
            ${(selected || []).map(v => `<span class="ms-chip" data-v="${v}">${(renderOptionFn ? renderOptionFn(v, true) : v)} <button class="ml-1 text-muted-foreground" data-remove="${v}"><i class="fa-solid fa-xmark"></i></button></span>`).join('')}
            <span id="${key}-placeholder" class="text-xs text-muted-foreground ${selected.length ? 'hidden':''}">${placeholder}</span>
          </div>
          <div id="${key}-dropdown" class="ms-dd hidden">
            ${search ? `<div class="p-2 border-b border-border"><input id="${key}-search" class="w-full h-8 px-2 text-sm rounded border border-input bg-background" placeholder="Search..."></div>` : ''}
            <div id="${key}-list" class="max-h-52 overflow-auto">
              ${options.map(o => `
                <div class="ms-dd-item" data-opt="${typeof o === 'string' ? o : o.value}">
                  <input type="checkbox" class="pointer-events-none" ${selected.includes(typeof o === 'string' ? o : o.value) ? 'checked':''}>
                  <span>${renderOptionFn ? renderOptionFn(o, false) : (typeof o === 'string' ? o : o.label)}</span>
                </div>
              `).join('')}
            </div>
          </div>
        </div>
      `;
      const control = $(`${key}-control`);
      const dd = $(`${key}-dropdown`);
      function openDD(){ dd.classList.remove('hidden'); }
      function closeDD(){ dd.classList.add('hidden'); }
      control.addEventListener('click', (e) => {
        if (e.target.dataset.remove) return; // handled below
        dd.classList.toggle('hidden');
      });
      document.addEventListener('click', (e) => {
        if (!mount.contains(e.target)) closeDD();
      });
      // remove chip
      control.querySelectorAll('[data-remove]').forEach(btn => {
        btn.addEventListener('click', (e) => {
          const v = btn.dataset.remove;
          window.__ms[key] = window.__ms[key].filter(x => x !== v);
          initMultiSelect(key, mountId, options, window.__ms[key], placeholder, search, renderOptionFn);
        });
      });
      // toggle item
      $(`${key}-list`).querySelectorAll('[data-opt]').forEach(row => {
        row.addEventListener('click', () => {
          const v = row.dataset.opt;
          const sel = new Set(window.__ms[key] || []);
          if (sel.has(v)) sel.delete(v); else sel.add(v);
          window.__ms[key] = Array.from(sel);
          initMultiSelect(key, mountId, options, window.__ms[key], placeholder, search, renderOptionFn);
          openDD();
        });
      });
      // search
      if ($(key+'-search')) {
        $(key+'-search').addEventListener('input', (e) => {
          const q = e.target.value.toLowerCase();
          $(`${key}-list`).querySelectorAll('[data-opt]').forEach(row => {
            const txt = row.textContent.toLowerCase();
            row.classList.toggle('hidden', !txt.includes(q));
          });
        });
      }
    }
    function getMultiSelectValues(key){ return window.__ms[key] || []; }

    /***********************
     * KANBAN (with filters)
     ***********************/
    window.__kanbanFilter = { search: '', assignee: '', priority: '', type: '' };

    function getKanbanTasks(status) {
      const f = window.__kanbanFilter;
      const visible = getVisibleTasks();
      return visible.filter(t => {
        if (t.status !== status) return false;
        if (f.search && !t.title.toLowerCase().includes(f.search.toLowerCase())) return false;
        if (f.assignee && t.assignedTo !== f.assignee) return false;
        if (f.priority && t.priority !== f.priority) return false;
        if (f.type && t.taskType !== f.type) return false;
        return true;
      });
    }

    function buildKanbanCard(task) {
      const isOverdue = task.dueDate && new Date(task.dueDate) < new Date() && task.status !== 'Completed';
      const prioColors = { High: 'bg-red-500', Medium: 'bg-yellow-400', Low: 'bg-blue-400' };
      const prioColor = prioColors[task.priority] || 'bg-gray-400';
      const checkDone = (task.checklist||[]).filter(c=>c.done).length;
      const checkTotal = (task.checklist||[]).length;
      return `
        <div draggable="${task.status !== 'Completed' ? 'true' : 'false'}"
          ondragstart="window.handleDragStart(event, '${task.id}')"
          class="kanban-card bg-card p-4 rounded-xl border border-border shadow-sm group relative overflow-hidden hover:shadow-md transition-all ${task.status === 'Completed' ? 'opacity-50' : ''}"
          onclick="window.openTaskModal('${task.id}')">
          <!-- Priority bar -->
          <div class="absolute top-0 left-0 w-1 h-full ${prioColor} rounded-l-xl"></div>
          <div class="pl-3">
            <!-- Type + checklist row -->
            <div class="flex items-center justify-between mb-2">
              ${task.taskType ? `<span class="text-[10px] font-semibold px-2 py-0.5 rounded-full bg-muted border border-border text-muted-foreground">${task.taskType}</span>` : '<span></span>'}
              ${checkTotal > 0 ? `<span class="text-[10px] text-muted-foreground flex items-center gap-1">✅ ${checkDone}/${checkTotal}</span>` : ''}
            </div>
            <!-- Title -->
            <h4 class="font-semibold text-sm leading-snug mb-2 group-hover:text-primary transition-colors line-clamp-2">${task.title}</h4>
            <!-- Project / Type badge -->
            ${task.taskType === 'Project' && task.projectId ? `<p class="text-[11px] text-muted-foreground mb-3">📁 ${getProjectName(task.projectId)}</p>` : task.taskType === 'Rates' ? '<p class="text-[11px] text-amber-500 mb-3">💰 Rate Task</p>' : ''}
            <!-- Footer -->
            <div class="flex items-center justify-between">
              ${getUserAvatar(task.assignedTo, 'w-6 h-6 text-xs border-2 border-card')}
              <span class="text-[11px] ${isOverdue ? 'text-red-500 font-semibold' : 'text-muted-foreground'} flex items-center gap-1">
                ${isOverdue ? '⚠️' : '📅'} ${formatDate(task.dueDate)}
              </span>
            </div>
          </div>
        </div>`;
    }

    window.renderKanbanCols = function renderKanbanCols() {
      const statuses = state.settings.statuses?.filter(s => ['Open','In Progress','For Review','Completed','Closed'].includes(s))
        || ['Open','In Progress','For Review','Completed','Closed'];
      const statusEmojis = { 'Open': '🔵', 'In Progress': '🟡', 'For Review': '🟣', 'Completed': '🟢', 'Closed': '⚫' };
      const cols = $('kanban-cols');
      if (!cols) return;
      cols.innerHTML = statuses.map(status => {
        const tasks = getKanbanTasks(status);
        return `
          <div class="w-72 shrink-0 flex flex-col">
            <div class="flex items-center justify-between mb-3 px-1">
              <h3 class="font-bold text-sm flex items-center gap-2">
                ${statusEmojis[status] || '⚪'} ${status}
                <span class="text-xs bg-muted text-muted-foreground px-2 py-0.5 rounded-full font-medium">${tasks.length}</span>
              </h3>
              <button onclick="window.openTaskModal()" class="w-6 h-6 rounded-full hover:bg-muted flex items-center justify-center text-muted-foreground hover:text-primary transition-colors text-lg leading-none">+</button>
            </div>
            <div class="flex-1 bg-muted/20 rounded-2xl p-3 space-y-3 min-h-[200px] overflow-y-auto border border-border/40 kanban-col transition-all"
                 ondragover="window.handleDragOver(event)"
                 ondrop="window.handleDrop(event, '${status}')"
                 ondragleave="window.handleDragLeave(event)">
              ${tasks.map(t => buildKanbanCard(t)).join('')}
              ${tasks.length === 0 ? `<div class="h-28 border-2 border-dashed border-border/50 rounded-xl flex flex-col items-center justify-center text-xs text-muted-foreground gap-1"><span class="text-2xl opacity-30">📋</span>Drop here</div>` : ''}
            </div>
          </div>`;
      }).join('');
    };

    function renderKanban() {
      const taskTypes = state.settings.taskTypes || [];
      const html = `
        <div class="flex flex-col h-full gap-4 animate-slide-in">
          <!-- Filters bar -->
          <div class="flex flex-wrap items-center gap-2 bg-card border border-border rounded-2xl px-4 py-3 shrink-0">
            <span class="text-sm font-bold text-muted-foreground mr-1">🔍 Filter:</span>
            <input id="kb-search" type="text" placeholder="Search tasks..." value="${window.__kanbanFilter.search}"
              oninput="window.__kanbanFilter.search=this.value; renderKanbanCols()"
              class="h-8 px-3 rounded-lg border border-input bg-background text-sm w-40 focus:outline-none focus:ring-1 focus:ring-ring">
            <select id="kb-assignee" onchange="window.__kanbanFilter.assignee=this.value; renderKanbanCols()"
              class="h-8 px-2 rounded-lg border border-input bg-background text-sm">
              <option value="">👤 Assignee</option>
              ${state.users.filter(u=>u.status!=='inactive').map(u=>`<option value="${u.id}" ${window.__kanbanFilter.assignee===u.id?'selected':''}>${u.name||u.email}</option>`).join('')}

              ${['High','Medium','Low'].map(p=>`<option value="${p}" ${window.__kanbanFilter.priority===p?'selected':''}>${p}</option>`).join('')}
            </select>
            <select id="kb-type" onchange="window.__kanbanFilter.type=this.value; renderKanbanCols()"
              class="h-8 px-2 rounded-lg border border-input bg-background text-sm">
              <option value="">📂 Type</option>
              ${taskTypes.map(t=>`<option value="${t}" ${window.__kanbanFilter.type===t?'selected':''}>${t}</option>`).join('')}
            </select>
            <button onclick="window.__kanbanFilter={search:'',assignee:'',priority:'',type:''}; renderKanban()"
              class="h-8 px-3 rounded-lg border border-border hover:bg-muted text-xs text-muted-foreground font-medium transition-colors ml-auto">
              ✕ Reset
            </button>
            <button onclick="window.openTaskModal()" class="h-8 px-4 rounded-lg bg-primary text-primary-foreground hover:bg-primary/90 text-xs font-bold transition-colors shadow-sm">

            </button>

          <div id="kanban-cols" class="flex gap-4 flex-1 overflow-x-auto pb-2">

      `;
      $('content-area').innerHTML = html;
      renderKanbanCols();
    }

    window.handleDragStart = function(e, taskId) {
      const t = state.tasks.find(x => x.id === taskId);
      if (!t || t.status === 'Completed') {
        e.preventDefault();
        return;
      }
      state.draggedTaskId = taskId;
      e.target.classList.add('dragging');
      e.dataTransfer.effectAllowed = 'move';
    };
    window.handleDragOver = function(e) { e.preventDefault(); e.currentTarget.classList.add('drag-over'); };
    window.handleDragLeave = function(e) { e.currentTarget.classList.remove('drag-over'); };
    window.handleDrop = async function(e, newStatus) {
      e.preventDefault();
      e.currentTarget.classList.remove('drag-over');
      const task = state.tasks.find(t => t.id === state.draggedTaskId);
      state.draggedTaskId = null;
      if (!task) return;

      if (task.status === 'Completed') {
        toast('Completed tasks cannot be dragged', 'warning');
        return;
      }

      if (task.status !== newStatus) {
        try {
          await updateDoc(doc(db, 'tasks', task.id), {
            status: newStatus,
            ...(newStatus === 'Completed' ? { closedAt: new Date().toISOString() } : {})
          });
          const statusEmoji = { 'Completed': '🎉', 'In Progress': '🔄', 'For Review': '👀', 'Closed': '🔒', 'Open': '🔵' };
          const sEmoji = statusEmoji[newStatus] || '📋';
          notify(task.assignedTo, `${sEmoji} Your task "${task.title}" was moved to ${newStatus}`, `tasks:${task.id}`, 'task');
          if (task.assignedBy && task.assignedBy !== task.assignedTo) notify(task.assignedBy, `${sEmoji} Task "${task.title}" moved to ${newStatus}`, `tasks:${task.id}`, 'task');
          toast(`Task moved to ${newStatus}`);
        } catch (e) {
          console.error(e);
          toast('Failed to move task', 'error');
        }
      }
    };

     * TASK LIST & MODAL (Modern tags dropdown)

              </button>
              <button onclick="window.openTaskModal()" class="h-9 px-4 bg-primary text-primary-foreground rounded-lg text-sm font-bold hover:bg-primary/90 transition-colors shadow-sm">＋ New Task</button>
            </div>
          </div>
          <!-- Table -->
          <div class="bg-card border border-border rounded-2xl shadow-sm overflow-hidden">
            <div class="overflow-x-auto">
              <table class="w-full text-sm text-left">
                <thead class="text-xs text-muted-foreground uppercase bg-muted/50 border-b border-border">
                  <tr>
                    <th class="px-4 py-3"><input type="checkbox" id="task-select-all" onchange="window.toggleSelectAllTasks(this)" class="rounded border-border"></th>
                    <th class="px-5 py-3 font-semibold">Task</th>
                    <th class="px-5 py-3 font-semibold">Type / Project</th>
                    <th class="px-5 py-3 font-semibold">Assigned</th>
                    <th class="px-5 py-3 font-semibold">Status</th>
                    <th class="px-5 py-3 font-semibold">Due Date</th>
                    <th class="px-5 py-3 font-semibold text-right">Actions</th>

                  ${generateTaskRows(visibleTasks)}

              </table>
            </div>
          </div>
        </div>
      `;
      $('content-area').innerHTML = html;
      $('task-search').addEventListener('input', filterTasks);
      $('task-filter-status').addEventListener('change', filterTasks);
      $('task-filter-project').addEventListener('change', filterTasks);
      $('task-filter-type').addEventListener('change', filterTasks);
      const dueFilt = $('task-filter-due'); if(dueFilt) dueFilt.addEventListener('change', filterTasks);
    }

    function generateTaskRows(tasks) {
      const isAdmin = state.currentUserDoc?.role === 'admin';
      const uid = currentUid();
      if (!tasks.length) return `<tr><td colspan="7" class="px-6 py-10 text-center text-muted-foreground"><div class="text-3xl mb-2">📋</div>No tasks found</td></tr>`;
      return tasks.map(task => {
        const isOverdue = task.dueDate && new Date(task.dueDate) < new Date() && task.status !== 'Completed';
        const isCompleted = task.status === 'Completed';
        const canEdit = isAdmin || (!isCompleted);
        const projName = task.taskType === 'Project' && task.projectId ? getProjectName(task.projectId) : (task.taskType === 'Rates' ? '💰 Rate Task' : '');
        return `
        <tr class="hover:bg-muted/30 transition-colors group task-row" data-id="${task.id}">
          <td class="px-4 py-3"><input type="checkbox" class="task-checkbox rounded border-border" data-id="${task.id}" onchange="window.updateTaskSelection()"></td>
          <td class="px-5 py-3 font-medium text-foreground">
            <div class="flex items-center gap-2 cursor-pointer" onclick="window.openTaskModal('${task.id}')">
              <div class="w-0.5 h-8 rounded-full ${isOverdue ? 'bg-red-500' : 'bg-primary/30'} shrink-0"></div>
              <div>
                <div class="flex items-center gap-1.5">
                  <span class="font-semibold">${task.title}</span>
                  ${(task.checklist?.length||0) ? `<span class="text-[10px] text-muted-foreground">✅ ${(task.checklist||[]).filter(c=>c.done).length}/${task.checklist.length}</span>` : ''}
                  ${isCompleted ? '<span class="text-[10px] bg-green-100 text-green-700 px-1.5 py-0.5 rounded-full font-bold">Done</span>' : ''}
                </div>
                <div class="text-xs text-muted-foreground mt-0.5">Created ${formatDate(task.createdAt)}</div>
              </div>
            </div>
          </td>
          <td class="px-5 py-3">
            <div class="space-y-0.5">
              ${task.taskType ? `<span class="px-2 py-0.5 rounded-full text-xs font-semibold bg-muted border border-border">${task.taskType}</span>` : ''}
              ${projName ? `<div class="text-[11px] text-muted-foreground mt-0.5">📁 ${projName}</div>` : ''}
            </div>
          </td>
          <td class="px-5 py-3">
            <div class="flex flex-wrap gap-1">
              ${(task.assignedToList||[task.assignedTo]).filter(Boolean).map(aid => `<div class="flex items-center gap-1"><span>${getUserAvatar(aid,'w-6 h-6 text-[10px]')}</span><span class="text-xs">${getUserName(aid)}</span></div>`).join('')}
            </div>
          </td>
          <td class="px-5 py-3">
            <span class="px-2.5 py-0.5 rounded-full text-xs font-semibold border ${getStatusBadgeClass(task.status)}">${task.status}</span>
          </td>
          <td class="px-5 py-3">
            <span class="text-xs ${isOverdue ? 'text-red-500 font-bold' : 'text-muted-foreground'}">${isOverdue ? '⚠️ ' : ''}${formatDate(task.dueDate)}</span>
          </td>
          <td class="px-5 py-3 text-right">
            ${canEdit || isAdmin ? `<button onclick="window.openTaskModal('${task.id}')" class="p-1.5 rounded-lg hover:bg-muted text-muted-foreground hover:text-foreground transition-colors"><i class="fa-solid fa-pen-to-square text-xs"></i></button>` : '<span class="text-xs text-muted-foreground">🔒</span>'}
          </td>
        </tr>`;
      }).join('');
    }

    window.toggleSelectAllTasks = function(cb) {
      document.querySelectorAll('.task-checkbox').forEach(c => c.checked = cb.checked);
      window.updateTaskSelection();
    };
    window.updateTaskSelection = function() {
      const checked = document.querySelectorAll('.task-checkbox:checked');
      const btn = $('task-mass-delete-btn');
      const label = $('task-selected-label');
      const cnt = $('task-selected-count');
      if (btn) btn.classList.toggle('hidden', checked.length === 0);
      if (label) label.classList.toggle('hidden', checked.length === 0);
      if (cnt) cnt.textContent = checked.length;
    };
    window.massDeleteTasks = async function() {
      const checked = Array.from(document.querySelectorAll('.task-checkbox:checked'));
      if (!checked.length) return;
      if (!confirm(`Delete ${checked.length} task(s)? This cannot be undone.`)) return;
      let deleted = 0;
      for (const cb of checked) {
        try {
          await deleteDoc(doc(db, 'tasks', cb.dataset.id));
          deleted++;
        } catch(e) { console.error(e); }
      }
      toast(`🗑️ ${deleted} task(s) deleted`, deleted === checked.length ? 'success' : 'warning');
    };

    function getVisibleTasks() {
      const uid = currentUid();
      const isAdmin = state.currentUserDoc?.role === 'admin';
      if (isAdmin) return state.tasks;
      return state.tasks.filter(t => 
        t.assignedTo === uid || t.assignedBy === uid || t.createdBy === uid ||
        (t.assignedToList||[]).includes(uid)
      );
    }

    function filterTasks() {
      const search = ($('task-search')?.value || '').toLowerCase();
      const status = $('task-filter-status')?.value || '';
      const project = $('task-filter-project')?.value || '';
      const type = $('task-filter-type')?.value || '';
      const due = $('task-filter-due')?.value || '';
      const now = new Date(); now.setHours(0,0,0,0);
      const filtered = getVisibleTasks().filter(t => {
        const hay = `${t.title} ${t.description || ''}`.toLowerCase();
        if (!hay.includes(search)) return false;
        if (status && t.status !== status) return false;
        if (project && t.projectId !== project) return false;
        if (type && t.taskType !== type) return false;
        if (due) {
          if (!t.dueDate) return false;
          const d = new Date(t.dueDate); d.setHours(0,0,0,0);
          const diff = Math.round((d - now)/(1000*60*60*24));
          if (due === 'overdue' && d >= now) return false;
          if (due === 'today' && diff !== 0) return false;
          if (due === 'week' && (diff < 0 || diff > 7)) return false;
          if (due === 'month' && (diff < 0 || diff > 30)) return false;
        }
        return true;
      });
      $('task-table-body').innerHTML = generateTaskRows(filtered);
    }

    window.openTaskModal = function(taskId = null, forceProjectId = '') {
      const isAdmin = state.currentUserDoc?.role === 'admin';
      const isEdit = !!taskId;
      // Non-admins can only VIEW (not create) tasks
      // Users can create their own tasks
      const task = isEdit ? state.tasks.find(t => t.id === taskId) : {};
      const projectId = forceProjectId || task?.projectId || '';
      const taskTypes = [...(state.settings.taskTypes || ['Project', 'Internal', 'Cluster']), 'Rates'].filter((v,i,a)=>a.indexOf(v)===i);
      const content = `

    window.saveTask = async function(taskId) {
      const title = $('t-title').value.trim();
      if (!title) return toast('Title is required', 'error');
      const dueDate = $('t-due').value;
      if (!dueDate) return toast('Due Date is required', 'error');
      const taskType = $('t-type').value;
      if (!taskType) return toast('Task Type is required', 'error');

      const checklistItems = [];
      document.querySelectorAll('#checklist-container > div').forEach(div => {
        const cb = div.querySelector('input[type="checkbox"]');
        const txt = div.querySelector('input[type="text"]');
        if (txt.value.trim()) checklistItems.push({ text: txt.value.trim(), done: cb.checked });
      });

      const isAdmin = state.currentUserDoc?.role === 'admin';
      let assignedList;
      if (isAdmin) {
        assignedList = getMultiSelectValues('t-assign-ms');
        if (!assignedList.length) assignedList = [currentUid()];
      } else {
        // Non-admin: always assigned to themselves
        assignedList = [currentUid()];
      }
      const primaryAssignee = assignedList[0] || currentUid();
      const payload = {
        title,
        description: $('t-desc').value,
        taskType,
        projectId: taskType === 'Project' ? ($('t-project')?.value || '') : '',
        assignedTo: primaryAssignee,
        assignedToList: assignedList,
        assignedBy: currentUid(),
        createdBy: currentUid(),
        status: $('t-status').value,
        priority: $('t-priority').value,
        dueDate,
        checklist: checklistItems,
        createdAt: taskId ? (state.tasks.find(t => t.id === taskId)?.createdAt || new Date().toISOString()) : new Date().toISOString()
      };

      try {
        if (taskId) {
          const oldTask = state.tasks.find(t => t.id === taskId);
          await updateDoc(doc(db, 'tasks', taskId), payload);
          // Notify all newly added assignees
          const oldList = oldTask?.assignedToList || (oldTask?.assignedTo ? [oldTask.assignedTo] : []);
          const newlyAdded = assignedList.filter(aid => !oldList.includes(aid));
          for (const aid of newlyAdded) {
            if (aid !== currentUid()) {
              await notify(aid, `✅ Task "${payload.title}" has been assigned to you — Due: ${payload.dueDate || 'TBD'} (${payload.priority || 'Medium'} priority)`, `tasks:${taskId}`, 'task');
            }
          }
          await logActivity('update', 'Tasks', 'Updated task: '+payload.title);
          toast('Task updated');
        } else {
          const added = await addDoc(collection(db, 'tasks'), payload);
          // Notify all assignees except self
          for (const aid of assignedList) {
            if (aid !== currentUid()) {
              await notify(aid, `✅ New task assigned to you: "${payload.title}" — Due: ${payload.dueDate || 'TBD'} (${payload.priority || 'Medium'} priority)`, `tasks:${added.id}`, 'task');
              toast(`🔔 ${getUserName(aid)} notified`, 'info');
            }
          }
          await logActivity('create', 'Tasks', 'Created task: '+payload.title);
          toast('Task created');
        }
        closeModal();
      } catch (e) {
        console.error(e);
        toast('Failed to save task', 'error');
      }
    };

    /***********************
     * ANNOUNCEMENTS (unchanged behavior; mentions notify)
     ***********************/
    // ── HTML Sanitizer (DOMPurify) ──────────────────────────────
    function sanitizeHtml(html) {
      if (typeof DOMPurify !== 'undefined') return DOMPurify.sanitize(html, { USE_PROFILES: { html: true } });
      return html.replace(/<script[\s\S]*?>[\s\S]*?<\/script>/gi, '');
    }

    // ── Quill EditorManager ──────────────────────────────────────
    // Central registry: EditorManager.init(id, opts) → Quill instance
    // Destroys previous instance on same container automatically.
    const EditorManager = (() => {
      const registry = {};
      const TOOLBAR = [
        [{ header: [1, 2, 3, false] }],
        ['bold', 'italic', 'underline', 'strike'],
        [{ color: [] }, { background: [] }],
        [{ list: 'ordered' }, { list: 'bullet' }, { list: 'check' }],
        ['blockquote', 'code-block'],
        ['link'],
        ['clean'],
      ];

      function init(containerId, { placeholder = 'Write something…', minHeight = '140px', readOnly = false } = {}) {
        // Destroy old instance on same container
        if (registry[containerId]) {
          try { registry[containerId].disable(); } catch(_) {}
          delete registry[containerId];
        }
        const el = $(containerId);
        if (!el) return null;
        el.innerHTML = `<div class="quill-wrap"><div id="${containerId}-ql"></div></div>`;
        const qlEl = $(`${containerId}-ql`);
        const q = new Quill(qlEl, {
          theme: 'snow',
          placeholder,
          readOnly,
          modules: { toolbar: readOnly ? false : TOOLBAR },
        });
        if (minHeight) qlEl.style.minHeight = minHeight;
        registry[containerId] = q;
        return q;
      }

      function get(containerId) { return registry[containerId] || null; }

      function getHTML(containerId) {
        const q = registry[containerId];
        if (!q) return '';
        const html = q.root.innerHTML;
        return html === '<p><br></p>' ? '' : sanitizeHtml(html);
      }

      function getText(containerId) {
        const q = registry[containerId];
        return q ? q.getText().trim() : '';
      }

      function setHTML(containerId, html) {
        const q = registry[containerId];
        if (!q) return;
        q.root.innerHTML = sanitizeHtml(html || '');
      }

      function clear(containerId) {
        const q = registry[containerId];
        if (q) q.setContents([]);
      }

      function destroy(containerId) {
        delete registry[containerId];
      }

      return { init, get, getHTML, getText, setHTML, clear, destroy };

    window.toggleLike = async function(aid) {
      const a = state.announcements.find(x => x.id === aid);
      if (!a) return;
      const uid = currentUid();
      const likes = new Set(a.likes||[]);
      const likedBefore = likes.has(uid);
      if (likedBefore) likes.delete(uid); else likes.add(uid);
      try {
        await updateDoc(doc(db, 'announcements', aid), { likes: Array.from(likes) });
        if (!likedBefore && a.authorId !== uid) notify(a.authorId, `${getUserName(uid)} liked your announcement`, `announcements:${aid}`, 'like');
      } catch (e) { console.error(e); toast('Failed to like','error'); }
    };

    window.postComment = async function(aid) {
      const input = $(`comment-${aid}`);
      if (!input) return;
      const text = input.value.trim();
      if (!text) return;
      const a = state.announcements.find(x => x.id === aid);
      const comments = a.comments || [];
      comments.push({ userId: currentUid(), text, date: new Date().toISOString() });

      // Mentions
      const mentioned = text.match(/@([\w.-]+)/g);
      if (mentioned) {
        mentioned.forEach(m => {
          const uname = m.substring(1).toLowerCase();
          const user = state.users.find(u => (u.name||'').toLowerCase().includes(uname) || (u.email||'').toLowerCase().startsWith(uname));
          if (user) notify(user.id, `You were mentioned in "${a.title}"`, `announcements:${aid}`, 'mention');
        });
      }
      try {
        await updateDoc(doc(db, 'announcements', aid), { comments });
        // notify author
        if (a.authorId && a.authorId !== currentUid()) notify(a.authorId, `${getUserName(currentUid())} commented on your announcement`, `announcements:${aid}`, 'comment');
        input.value = '';
      } catch (e) { console.error(e); toast('Failed to comment','error'); }
    };

        });

          .forEach(u => notify(u.id, `🎓 New article: "${title}" — check it out!`, `learning:${added.id}`, 'learning'));

    window.toggleLearningLike = async function(id) {
      const l = state.learning.find(x => x.id === id);
      if (!l) return;
      const uid = currentUid();
      const likes = new Set(l.likes||[]);
      const likedBefore = likes.has(uid);
      if (likedBefore) likes.delete(uid); else likes.add(uid);
      try {
        await updateDoc(doc(db, 'learning', id), { likes: Array.from(likes) });
        if (!likedBefore && l.authorId !== uid) notify(l.authorId, `${getUserName(uid)} liked your learning post`, `learning:${id}`, 'like');
      } catch(e) { console.error(e); toast('Failed to like','error'); }
    };

    window.viewLearning = async function(id) {
      const l = state.learning.find(x => x.id === id);
      if (!l) return;
      // Mark as seen
      const uid = currentUid();
      if (uid && !(l.seenBy||[]).includes(uid)) {
        try { await updateDoc(doc(db,'learning',id), { seenBy: [...(l.seenBy||[]), uid] }); } catch(e) {}
      }
      const isLiked = (l.likes || []).includes(currentUid());
      const isAdmin = state.currentUserDoc?.role === 'admin';
      const isAuthor = l.authorId === currentUid();
      const renderedContent = l.content || '';
      const icons = ['📖','🔬','💡','🎯','🚀','📊','🧩','🌱'];

            <div class="lg:col-span-2 space-y-5">

              <div class="bg-card border border-border rounded-2xl overflow-hidden shadow-sm">

                <div class="bg-gradient-to-r from-primary/20 via-primary/10 to-transparent p-8 border-b border-border">
                  <div class="flex items-start gap-4">
                    <div id="lh-icon-${l.id}" class="w-16 h-16 rounded-2xl ${accent} flex items-center justify-center text-3xl shadow-lg cursor-pointer select-none" onclick="window.toggleIconPicker('${l.id}')" title="Click to change icon">${iconEmoji}</div>
                    <div class="flex-1 min-w-0">
                      <div class="flex flex-wrap gap-1.5 mb-2">
                        ${(l.tags||[]).map(t=>`<span class="text-[10px] font-bold px-2 py-0.5 rounded-full bg-primary/10 text-primary border border-primary/20">${t}</span>`).join('')}
                      </div>
                      <h1 class="text-2xl font-black leading-snug mb-2">${l.title}</h1>
                      <div class="flex items-center gap-3 text-xs text-muted-foreground">
                        ${getUserAvatar(l.authorId,'w-6 h-6 text-[10px]')}
                        <span class="font-semibold">${l.authorName||'User'}</span>
                        <span>·</span><span>${timeAgo(l.createdAt)}</span>
                        ${l.fileName ? `<span>·</span><a href="${l.fileUrl||'#'}" target="_blank" class="flex items-center gap-1 text-primary hover:underline font-medium">📎 ${l.fileName}</a>` : ''}
                        ${(isAdmin||isAuthor) ? `<span>·</span><button onclick="window.editLearning('${l.id}')" class="text-blue-500 hover:underline">✏️ Edit</button>` : ''}
                        ${(isAdmin||isAuthor) ? `<span>·</span><button onclick="window.deleteLearning('${l.id}')" class="text-destructive hover:underline">🗑️ Delete</button>` : ''}

                  <div class="flex flex-wrap gap-2">

                      `<button onclick="window.updateLearningIcon('${l.id}','${e}')" class="text-2xl p-2 rounded-xl hover:bg-muted transition-colors">${e}</button>`

                  <span class="text-xs text-muted-foreground">${(l.comments||[]).length} comments · ${(l.likes||[]).length} likes</span>
                </div>
                <button onclick="window.toggleLearningLike('${l.id}')"
                  class="w-full py-3 rounded-xl flex items-center justify-center gap-2 font-bold text-sm transition-all ${isLiked ? 'bg-red-50 dark:bg-red-900/20 text-red-500 border border-red-200 dark:border-red-800' : 'bg-muted hover:bg-red-50 hover:text-red-500 border border-border'}">
                  ${isLiked ? '❤️' : '🤍'} ${isLiked ? 'Liked' : 'Like this article'}
                  <span class="ml-1 text-xs font-normal">(${(l.likes||[]).length})</span>
                </button>
                ${l.fileUrl ? `
                <a href="${l.fileUrl}" target="_blank" class="mt-3 w-full py-2.5 rounded-xl flex items-center justify-center gap-2 text-sm font-semibold bg-primary/5 text-primary border border-primary/20 hover:bg-primary/10 transition-all">
                  📎 Download Attachment
                </a>` : ''}
              </div>

              <!-- Comments Card -->
              <div class="bg-card border border-border rounded-2xl p-5 shadow-sm">
                <h4 class="font-bold text-sm mb-4">💬 Comments (${(l.comments||[]).length})</h4>
                <!-- Comment input -->
                <div class="flex gap-2 mb-4">
                  ${getUserAvatar(currentUid(),'w-8 h-8 text-xs shrink-0')}
                  <div class="flex-1 flex gap-2">
                    <input id="lh-cmt-${l.id}" placeholder="Write a comment…"
                      class="flex-1 h-9 px-3 rounded-xl border border-input bg-background text-xs focus:outline-none focus:ring-1 focus:ring-ring"
                      onkeydown="if(event.key==='Enter'){window.addLearningComment('${l.id}'); setTimeout(()=>window.viewLearning('${l.id}'),200);}">
                    <button onclick="window.addLearningComment('${l.id}'); setTimeout(()=>window.viewLearning('${l.id}'),200)"
                      class="h-9 px-3 rounded-xl bg-primary text-primary-foreground text-xs font-bold hover:bg-primary/90">→</button>
                  </div>
                </div>
                <!-- Comment thread -->
                <div class="space-y-3 max-h-[400px] overflow-y-auto pr-1">
                  ${(l.comments||[]).slice().reverse().map(c => {
                    const u = state.users.find(x=>x.id===c.userId);
                    return `<div class="flex gap-2.5 group">
                      ${getUserAvatar(c.userId,'w-7 h-7 text-[10px] shrink-0')}
                      <div class="flex-1 min-w-0">
                        <div class="bg-muted/50 rounded-xl px-3 py-2">
                          <p class="text-xs font-bold mb-0.5">${u?.name||u?.email||'User'}</p>
                          <p class="text-xs leading-relaxed">${c.text}</p>
                        </div>
                        <p class="text-[10px] text-muted-foreground mt-0.5 px-1">${timeAgo(c.date)}</p>
                      </div>

                  }).join('') || '<p class="text-xs text-muted-foreground text-center py-4">No comments yet. Be the first!</p>'}
                </div>
              </div>
            </div>
          </div>
        </div>
      `;
      $('content-area').innerHTML = html;
    };

    window.toggleIconPicker = function(id) {
      const picker = $(`icon-picker-${id}`);
      if (picker) picker.classList.toggle('hidden');
    };
    window.updateLearningIcon = async function(id, emoji) {
      const iconEl = $(`lh-icon-${id}`);
      if (iconEl) iconEl.textContent = emoji;
      $(`icon-picker-${id}`)?.classList.add('hidden');
      try { await updateDoc(doc(db,'learning',id), { icon: emoji }); } catch(e) {}
    };
    window.deleteLearning = async function(id) {
      if (!confirm('Delete this article?')) return;
      try {
        await deleteDoc(doc(db,'learning',id));
        toast('Article deleted');
        navigate('learning');
      } catch(e) { toast('Failed to delete','error'); }
    };

    window.editLearning = function(id) {
      const l = state.learning.find(x=>x.id===id);
      if (!l) return;
      const c = `
        <div class="p-6 border-b border-border flex justify-between items-center bg-muted/30 rounded-t-xl">
          <h3 class="text-lg font-bold">✏️ Edit Article</h3>
          <button onclick="window.closeModal()" class="text-muted-foreground hover:text-foreground"><i class="fa-solid fa-xmark text-xl"></i></button>
        </div>
        <div class="p-6 space-y-4 overflow-y-auto max-h-[70vh]">
          <div>
            <label class="text-sm font-semibold block mb-1">Title <span class="text-destructive">*</span></label>
            <input id="lh-edit-title" value="${(l.title||'').replace(/"/g,'&quot;')}" class="w-full h-10 px-3 rounded-xl border border-input bg-background text-sm focus:outline-none focus:ring-2 focus:ring-ring">
          </div>
          <div>
            <label class="text-sm font-semibold block mb-1">Tags (press Enter or comma to add)</label>
            <div id="lh-edit-tags-container" class="min-h-[40px] px-2 py-1 rounded-xl border border-input bg-background flex flex-wrap gap-1.5 items-center cursor-text" onclick="document.getElementById('lh-edit-tag-input').focus()">
              ${(l.tags||[]).map(t=>`<span class="inline-flex items-center gap-1 px-2 py-0.5 rounded-full bg-primary/10 text-primary text-xs font-medium">${t}<button onclick="window.removeLHTag(this,'${t}')" class="ml-1 hover:text-destructive">×</button></span>`).join('')}
              <input id="lh-edit-tag-input" placeholder="Add tag..." class="flex-1 min-w-[80px] bg-transparent border-none outline-none text-sm h-7" onkeydown="window.handleLHTagInput(event,'${id}')">
            </div>
          </div>
          <div>
            <label class="text-sm font-semibold block mb-1">Content <span class="text-destructive">*</span></label>
            <div id="lh-edit-editor-mount"></div>
          </div>
        </div>
        <div class="p-6 border-t border-border bg-muted/30 rounded-b-xl flex justify-end gap-3">
          <button onclick="window.closeModal()" class="px-4 py-2 rounded-xl border border-input bg-background hover:bg-muted text-sm font-medium">Cancel</button>
          <button onclick="window.updateLearning('${id}')" class="px-5 py-2 rounded-xl bg-primary text-white hover:bg-primary/90 text-sm font-bold shadow-sm">💾 Update Article</button>
        </div>`;
      window._lhEditTags = l.tags ? [...l.tags] : [];
      showModal(c);
      EditorManager.init('lh-edit-editor-mount', { placeholder: 'Write your article…', minHeight: '220px' });
      if (l.content) EditorManager.setHTML('lh-edit-editor-mount', l.content);
    };

    window._lhEditTags = [];
    window.handleLHTagInput = function(e) {
      if (e.key==='Enter'||e.key===',') {
        e.preventDefault();
        const input = $('lh-edit-tag-input');
        const tag = (input.value||'').replace(/,/g,'').trim();
        if (tag && !window._lhEditTags.includes(tag)) {
          window._lhEditTags.push(tag);
          const span = document.createElement('span');
          span.className = 'inline-flex items-center gap-1 px-2 py-0.5 rounded-full bg-primary/10 text-primary text-xs font-medium';
          span.innerHTML = `${tag}<button onclick="window.removeLHTag(this,'${tag}')" class="ml-1 hover:text-destructive">×</button>`;
          $('lh-edit-tags-container').insertBefore(span, input);
        }
        input.value = '';
      }
    };
    window.removeLHTag = function(btn, tag) {
      window._lhEditTags = (window._lhEditTags||[]).filter(t=>t!==tag);
      btn.parentElement.remove();
    };

    window.updateLearning = async function(id) {
      const title = $('lh-edit-title')?.value?.trim();
      const contentHtml = EditorManager.getHTML('lh-edit-editor-mount');
      if (!title) return toast('Title is required','error');
      const tags = window._lhEditTags || [];
      try {
        await updateDoc(doc(db,'learning',id), { title, content: contentHtml, tags, updatedAt: serverTimestamp() });
        toast('Article updated');
        closeModal();
        navigate('learning');
      } catch(e) { console.error(e); toast('Failed to update','error'); }
    };

    window.addLearningComment = async function(id) {
      const l = state.learning.find(x => x.id === id);
      const input = $(`lh-cmt-${id}`);
      const text = input.value.trim();
      if (!text) return;
      const comments = l.comments || [];
      const c = { userId: currentUid(), text, date: new Date().toISOString() };
      comments.push(c);

      // mentions
      const mentioned = text.match(/@([\w.-]+)/g);
      if (mentioned) {
        mentioned.forEach(m => {
          const uname = m.substring(1).toLowerCase();
          const user = state.users.find(u => (u.name||'').toLowerCase().includes(uname) || (u.email||'').toLowerCase().startsWith(uname));
          if (user) notify(user.id, `You were mentioned in "${l.title}"`, `learning:${id}`, 'mention');
        });
      }

      try {
        await updateDoc(doc(db, 'learning', id), { comments });
        // notify author
        if (l.authorId && l.authorId !== currentUid()) notify(l.authorId, `${getUserName(currentUid())} commented on your learning post`, `learning:${id}`, 'comment');
        input.value = '';
      } catch(e) { console.error(e); toast('Failed to comment','error'); }
    };

    /***********************
     * RATES (unchanged, plus notify)
     ***********************/
    function renderRates() {
      const uid = currentUid();
      const isAdmin = state.currentUserDoc?.role === 'admin';
      const allRates = state.rates || [];
      const myRates = allRates.filter(r => r.assignedAnalystId === uid || r.createdBy === uid);
      const pending = allRates.filter(r=>r.status==='Pending').length;
      const inProgress = allRates.filter(r=>r.status==='In Progress').length;
      const completed = allRates.filter(r=>r.status==='Completed').length;
      // Avg close time
      const closedRates = allRates.filter(r=>r.status==='Completed'&&r.createdAt&&r.closedAt);
      const avgCloseMs = closedRates.length ? closedRates.reduce((s,r)=>{
        const c = r.createdAt?.toDate?r.createdAt.toDate():new Date(r.createdAt);
        const cl = r.closedAt?.toDate?r.closedAt.toDate():new Date(r.closedAt);
        return s+(cl-c);
      },0)/closedRates.length : 0;
      const avgCloseDays = avgCloseMs ? Math.round(avgCloseMs/(1000*60*60*24)) : 0;

      const html = `
        <div class="max-w-6xl mx-auto space-y-5 animate-slide-in">
          <div class="bg-gradient-to-r from-amber-400/15 via-primary/10 to-transparent border border-border rounded-2xl p-6">
            <div class="flex items-center justify-between">
              <div>
                <h2 class="text-xl font-black flex items-center gap-2">💰 Rate Requests</h2>
                <p class="text-sm text-muted-foreground">${allRates.length} total requests</p>
              </div>
              <button onclick="window.openRateModal()" class="px-5 py-2.5 bg-primary text-primary-foreground rounded-xl font-bold text-sm shadow hover:shadow-md hover:bg-primary/90 transition-all">
                ＋ New Request
              </button>
            </div>
          </div>
          <!-- KPI Cards -->
          <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
            <div class="bg-card border border-border rounded-2xl p-4 text-center shadow-sm">
              <div class="text-3xl font-black text-orange-500">${pending}</div>
              <div class="text-xs text-muted-foreground mt-1">⏳ Pending</div>
            </div>
            <div class="bg-card border border-border rounded-2xl p-4 text-center shadow-sm">
              <div class="text-3xl font-black text-blue-500">${inProgress}</div>
              <div class="text-xs text-muted-foreground mt-1">🔄 In Progress</div>
            </div>
            <div class="bg-card border border-border rounded-2xl p-4 text-center shadow-sm">
              <div class="text-3xl font-black text-green-500">${completed}</div>
              <div class="text-xs text-muted-foreground mt-1">✅ Completed</div>
            </div>
            <div class="bg-card border border-border rounded-2xl p-4 text-center shadow-sm">
              <div class="text-3xl font-black text-purple-500">${avgCloseDays || '—'}</div>
              <div class="text-xs text-muted-foreground mt-1">📊 Avg Days to Close</div>
            </div>
          </div>
          <!-- My vs Team tabs -->
          <div class="flex gap-2 items-center">
            <button id="rate-tab-my" onclick="window.setRateTab('my')" class="px-4 py-2 rounded-xl text-sm font-bold bg-primary text-primary-foreground shadow">My Requests</button>
            <button id="rate-tab-team" onclick="window.setRateTab('team')" class="px-4 py-2 rounded-xl text-sm font-bold border border-border hover:bg-muted">Team Requests</button>
            <!-- Filter -->
            <div class="ml-auto flex gap-2">
              <select id="rate-filter-status" onchange="window.filterRates()" class="h-9 px-3 rounded-lg border border-input bg-background text-sm">
                <option value="">All Status</option>
                <option>Pending</option>
                <option>In Progress</option>
                <option>Completed</option>
              </select>
              <select id="rate-filter-type" onchange="window.filterRates()" class="h-9 px-3 rounded-lg border border-input bg-background text-sm">
                <option value="">All Types</option>
                <option>RCA</option>
                <option>VALE</option>
                <option>Upload</option>
              </select>
              <input id="rate-search" type="text" placeholder="Search..." oninput="window.filterRates()" class="h-9 px-3 rounded-lg border border-input bg-background text-sm w-32 focus:outline-none focus:ring-1 focus:ring-ring">
            </div>
          </div>
          <!-- Table -->
          <div class="bg-card border border-border rounded-2xl shadow-sm overflow-hidden">
            <div class="overflow-x-auto">
              <table class="w-full text-sm text-left">
                <thead class="text-xs text-muted-foreground uppercase bg-muted/50 border-b border-border">
                  <tr>
                    <th class="px-5 py-3">Type</th>
                    <th class="px-5 py-3">Rate ID</th>
                    <th class="px-5 py-3">Requester</th>
                    <th class="px-5 py-3">Cluster</th>
                    <th class="px-5 py-3">Assigned</th>
                    <th class="px-5 py-3">Status</th>
                    <th class="px-5 py-3 text-right">Action</th>
                  </tr>
                </thead>
                <tbody id="rate-table-body" class="divide-y divide-border">
                  ${renderRateRows(myRates)}
                </tbody>
              </table>
            </div>
          </div>
        </div>
      `;
      $('content-area').innerHTML = html;
      window.__rateTab = 'my';
    }

    function renderRateRows(rates) {
      if (!rates.length) return `<tr><td colspan="7" class="px-6 py-10 text-center text-muted-foreground">No rate requests found</td></tr>`;
      return rates.map(r => `
        <tr class="hover:bg-muted/50 transition-colors">
          <td class="px-5 py-4"><span class="px-2 py-0.5 rounded-full text-xs font-semibold bg-amber-100 text-amber-700 dark:bg-amber-900/30 dark:text-amber-300">${r.rateType||'Upload'}</span></td>
          <td class="px-5 py-4 font-mono font-bold text-primary">${r.rateId||''}</td>
          <td class="px-5 py-4">${r.requesterName||''}</td>
          <td class="px-5 py-4"><span class="px-2 py-0.5 rounded-full text-xs bg-muted border border-border">${r.cluster||''}</span></td>

            <button onclick="window.viewRate('${r.id}')" class="text-primary hover:underline text-xs font-medium">View Details</button>
          </td>
        </tr>`).join('');
    }

    window.__rateTab = 'my';
    window.setRateTab = function(tab) {
      window.__rateTab = tab;
      const myBtn = $('rate-tab-my');
      const teamBtn = $('rate-tab-team');
      if (myBtn) { myBtn.className = `px-4 py-2 rounded-xl text-sm font-bold ${tab==='my'?'bg-primary text-primary-foreground shadow':'border border-border hover:bg-muted'}`; }
      if (teamBtn) { teamBtn.className = `px-4 py-2 rounded-xl text-sm font-bold ${tab==='team'?'bg-primary text-primary-foreground shadow':'border border-border hover:bg-muted'}`; }
      window.filterRates();
    };
    window.filterRates = function() {
      const uid = currentUid();
      const status = $('rate-filter-status')?.value||'';
      const type = $('rate-filter-type')?.value||'';
      const search = ($('rate-search')?.value||'').toLowerCase();
      let rates = state.rates||[];
      if (window.__rateTab === 'my') rates = rates.filter(r=>r.assignedAnalystId===uid||r.createdBy===uid);
      if (status) rates = rates.filter(r=>r.status===status);
      if (type) rates = rates.filter(r=>r.rateType===type);
      if (search) rates = rates.filter(r=>`${r.rateId||''} ${r.requesterName||''}`.toLowerCase().includes(search));
      const tbody = $('rate-table-body');
      if (tbody) tbody.innerHTML = renderRateRows(rates);
    };

    window.openRateModal = function() {
      const nextId = `RATE-${new Date().getFullYear()}-${String(state.rates.length + 1).padStart(3, '0')}`;
      const content = `
        <div class="p-6 border-b border-border flex justify-between items-center">
          <h3 class="text-lg font-semibold">New Rate Request</h3>
          <button onclick="window.closeModal()" class="text-muted-foreground hover:text-foreground"><i class="fa-solid fa-xmark text-xl"></i></button>
        </div>
        <div class="p-6 space-y-4">
          <div class="grid grid-cols-2 gap-4">
            <div>
              <label class="block text-sm font-medium mb-1">Rate ID (Auto)</label>
              <input type="text" value="${nextId}" disabled class="w-full h-10 px-3 rounded-md border border-input bg-muted text-muted-foreground">
            </div>
            <div>
              <label class="block text-sm font-medium mb-1">Requester Name</label>
              <input type="text" id="r-name" class="w-full h-10 px-3 rounded-md border border-input bg-background">

    window.saveRate = async function(rid) {
      const name = $('r-name').value.trim();
      if (!name) return toast('Requester name is required', 'error');
      const fileInput = $('r-file');
      let fileUrl = '';
      let fileName = '';
      try {
        if (fileInput.files && fileInput.files[0]) {
          const f = fileInput.files[0];
          const allowed = ['application/pdf',
            'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet',
            'application/vnd.ms-excel',
            'text/csv'
          ];
          const maxBytes = 10 * 1024 * 1024; // 10MB
          if (!allowed.includes(f.type) && !/\.(pdf|xlsx|xls|csv)$/i.test(f.name)) {
            toast('Unsupported file type', 'error'); return;
          }
          if (f.size > maxBytes) { toast('File too large (max 10MB)', 'error'); return; }
          fileName = f.name;
          const ref = sRef(storage, `rates/${rid}/${f.name}`);
          await uploadBytes(ref, f);
          fileUrl = await getDownloadURL(ref);
        }
        const newRate = {
          rateId: rid,
          rateType: $('r-type').value,
          requesterName: name,
          cluster: $('r-cluster').value,
          assignedAnalystId: $('r-analyst').value,
          message: $('r-msg').value,
          status: 'Pending',
          fileName: fileName || '',
          fileUrl: fileUrl || '',
          createdAt: serverTimestamp()
        };
        const added = await addDoc(collection(db, 'rates'), newRate);

        // Linked task
        const linkedTask = {
          title: `Process Rate Request: ${rid}`,
          description: `Requester: ${name}\nCluster: ${newRate.cluster}\nType: ${newRate.rateType}\nMessage: ${newRate.message}`,
          status: 'Open',
          priority: 'High',
          projectId: '', // Rate Task
          assignedTo: newRate.assignedAnalystId,
          assignedBy: currentUid(),
          createdAt: new Date().toISOString(),
          dueDate: '',
          checklist: [],
          tags: ['Rate Task']
        };
        const taskDoc = await addDoc(collection(db, 'tasks'), linkedTask);

        notify(newRate.assignedAnalystId, `💰 New Rate Request assigned to you: "${rid}" — Please review and process.`, `rates`, 'rate');
        notify(newRate.assignedAnalystId, `✅ A task was created for rate "${rid}" — check your task board.`, `tasks:${taskDoc.id}`, 'task');
        closeModal();
        toast('Rate request submitted and task created');
      } catch (e) {
        console.error(e);
        toast('Failed to submit rate request', 'error');
      }
    };

          updateData.closedBy = uid;

        await updateDoc(doc(db, 'rates', rid), updateData);
        const r = state.rates.find(x => x.id === rid);
        if (r) {
          // Notify assigned analyst and team
          const emoji = status==='Completed'?'✅':status==='In Progress'?'🔄':'⏳';
          notify(r.assignedAnalystId, `${emoji} Rate "${r.rateId}" status changed to ${status}`, 'rates', 'rate');

          state.users.filter(u=>u.status!=='inactive'&&u.id!==uid).forEach(u=>
            notify(u.id, `${emoji} Rate "${r.rateId}" updated to ${status} by ${getUserName(uid)}`, 'rates', 'rate')

          const task = state.tasks.find(t => (t.title||'').includes(r.rateId));

              status: status === 'Completed' ? 'Completed' : 'In Progress',

    window.saveUser = async function(uid) {
      const name = $('u-name').value.trim();
      const email = $('u-email').value.trim();
      const password = $('u-password').value;
      if (!name || !email) return toast('Name and Email required', 'error');

      // unique email guard
      try {
        const qDup = query(collection(db, 'users'), where('email', '==', email));
        const snapDup = await getDocs(qDup);
        const dup = snapDup.docs.find(d => d.id !== uid);
        if (dup) { toast('Email already exists', 'error'); return; }
      } catch(e) { console.error(e); toast('Failed to validate email','error'); return; }

      const payload = {
        name, email,
        password: password || '',
        role: $('u-role').value,
        status: $('u-status').value
      };
      try {
        if (uid) {
          await updateDoc(doc(db, 'users', uid), payload);
        } else {
          const added = await addDoc(collection(db, 'users'), payload);
          payload.id = added.id;
        }
        closeModal(); toast('User saved');
      } catch (e) { console.error(e); toast('Failed to save user','error'); }
    };

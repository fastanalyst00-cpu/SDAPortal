    function chipEditor(id, label, values) {
      const key = id;
      const containerId = `${id}-chips`;
      setTimeout(() => {
        const input = $(`${id}-input`); const cont = $(containerId);
        function renderChips() {
          cont.innerHTML = (state.settings[key]||[]).map((v,i) => `
            <span class="inline-flex items-center gap-2 px-2 py-1 rounded-full border text-xs mr-2 mb-2">
              ${v}
              <button data-index="${i}" class="text-destructive"><i class="fa-solid fa-xmark"></i></button>
            </span>
          `).join('');
          cont.querySelectorAll('button[data-index]').forEach(btn => {
            btn.addEventListener('click', () => {
              const idx = parseInt(btn.dataset.index,10);
              state.settings[key].splice(idx,1); renderChips();
            });
          });
        }
        renderChips();
        input.addEventListener('keydown', (e) => {
          if (e.key === 'Enter') {
            const val = input.value.trim();
            if (val) { state.settings[key] = [...(state.settings[key]||[]), val]; input.value = ''; renderChips(); }
          }
        });
      });
      return `
        <div>
          <label class="block text-sm font-semibold mb-2">${label}</label>
          <div id="${containerId}" class="flex flex-wrap"></div>
          <input id="${id}-input" placeholder="Type and press Enter" class="mt-2 w-full h-9 px-3 rounded-md border border-input bg-background text-sm"/>
        </div>
      `;
    }

    function downloadCSV(filename, rows) {
      const escape = (v) => { if (v==null) return ''; const val=String(v).replace(/"/g,'""'); return /[",\n]/.test(val)?`"${val}"`:val; };
      const csv = rows.map(r=>r.map(escape).join(',')).join('\n');
      const blob = new Blob([csv],{type:'text/csv;charset=utf-8;'});
      const link = document.createElement('a');
      link.href = URL.createObjectURL(blob);
      link.download = filename;
      document.body.appendChild(link); link.click(); document.body.removeChild(link);
    }

    window.exportReportCSV = function() {
      const now = new Date();
      const rows=[['Member','Email','Total Tasks','Completed','Overdue','Efficiency %','Quizzes','Avg Quiz %']];
      state.users.forEach(u => {
        const uts=state.tasks.filter(t=>t.assignedTo===u.id);
        const comp=uts.filter(t=>t.status==='Completed').length;
        const over=uts.filter(t=>t.dueDate&&new Date(t.dueDate)<now&&t.status!=='Completed').length;
        const eff=uts.length?Math.round((comp/uts.length)*100):0;
        const uR=(state.allQuizResults||[]).filter(r=>r.userId===u.id);
        const avgQ=uR.length?Math.round(uR.reduce((s,r)=>s+(r.percentage||0),0)/uR.length):0;
        rows.push([u.name||'',u.email||'',uts.length,comp,over,eff+'%',uR.length,avgQ+'%']);
      });
      downloadCSV(`productivity_${new Date().toISOString().slice(0,10)}.csv`,rows);
      toast('📥 Report exported');
    };

    function renderQuizzes() {
      const isAdmin = state.currentUserDoc?.role === 'admin';
      const uid = currentUid();
      const myResults = state.quizResults || [];
      const now = new Date();

      // Build per-quiz result map for current user
      const resultsByQuiz = {};
      myResults.forEach(r => {
        if (!resultsByQuiz[r.quizId] || (r.date?.seconds||0) > (resultsByQuiz[r.quizId].date?.seconds||0)) {
          resultsByQuiz[r.quizId] = r;
        }
      });

      // Get quizzes the user is supposed to take (via quiz_schedules)
      const mySchedules = (state.quizSchedules || []).filter(s => {
        const isTagged = !s.taggedUsers?.length || s.taggedUsers.includes(uid);
        return isTagged;
      });
      const scheduledQuizIds = new Set(mySchedules.map(s => s.quizId));

      // Classify quizzes
      const quizzesToShow = isAdmin
        ? state.quizzes
        : state.quizzes.filter(q => scheduledQuizIds.has(q.id) || resultsByQuiz[q.id]);

      // Admin can reset retakes — check adminUnlocked
      const available = [], locked = [], missed = [], done = [];
      quizzesToShow.forEach(q => {
        const sched = mySchedules.find(s => s.quizId === q.id);
        const result = resultsByQuiz[q.id];
        const deadline = sched?.deadline ? new Date(sched.deadline) : null;
        const isMissed = deadline && now > deadline && !result;
        const isAdminUnlocked = (sched?.retakeAllowed || []).includes(uid);

        if (pct>=60) return {label:'Average',cls:'text-yellow-600',bg:'bg-yellow-50 dark:bg-yellow-900/20',bar:'bg-yellow-500'};

                const g = gradeInfo(pct);
                return `

            <div class="grid grid-cols-1 gap-3">

    window.submitQuiz = async function(qid) {
      if (window.__quizTimer) { clearInterval(window.__quizTimer); window.__quizTimer = null; }
      const quiz = state.quizzes.find(q => q.id === qid);
      if (!quiz) return;
      const answers = window.__quizAnswers || {};
      const unanswered = quiz.questions.filter((_,i) => answers[i] === undefined).length;
      if (unanswered > 0 && !confirm(`You have ${unanswered} unanswered question(s). Submit anyway?`)) return;

      let score = 0;
      quiz.questions.forEach((q, i) => { if (answers[i] === q.correctIndex) score++; });
      const total = quiz.questions.length;
      const pct = total > 0 ? Math.round((score/total)*100) : 0;
      const g = (() => {
        if (pct>=90) return {label:'Excellent',cls:'text-green-600',emoji:'🏆',bar:'bg-green-500',border:'border-green-200'};
        if (pct>=75) return {label:'Good',cls:'text-blue-600',emoji:'👍',bar:'bg-blue-500',border:'border-blue-200'};
        if (pct>=60) return {label:'Average',cls:'text-yellow-600',emoji:'✔️',bar:'bg-yellow-500',border:'border-yellow-200'};
        return {label:'Needs Work',cls:'text-red-500',emoji:'📚',bar:'bg-red-400',border:'border-red-200'};
      })();

      try {
        await addDoc(collection(db,'quiz_results'), {
          quizId:qid, userId:currentUid(), score, total, percentage:pct, date:serverTimestamp()
        });
        const qidCopy = qid;
        const resultHtml = `
          <div class="p-8 flex flex-col items-center text-center">
            <div class="text-6xl mb-2">${g.emoji}</div>
            <h3 class="text-xl font-black mb-1">${quiz.title}</h3>
            <p class="text-sm text-muted-foreground mb-5">Quiz Submitted!</p>
            <div class="w-40 h-40 rounded-full border-8 ${g.border} flex items-center justify-center mb-4 shadow-inner bg-card">
              <div>
                <div class="text-4xl font-black ${g.cls}">${pct}%</div>
                <div class="text-xs text-muted-foreground">${score} / ${total}</div>
              </div>
            </div>
            <div class="text-lg font-bold ${g.cls} mb-3">${g.label}</div>
            <div class="w-full max-w-xs bg-muted rounded-full h-3 overflow-hidden mb-6">
              <div class="h-full ${g.bar} rounded-full" style="width:${pct}%"></div>
            </div>
            <!-- Per-question breakdown -->
            <div class="w-full max-w-sm text-left space-y-2 mb-6">
              ${quiz.questions.map((q,i) => {
                const correct = answers[i] === q.correctIndex;
                return `<div class="flex items-start gap-2 text-xs p-2 rounded-lg ${correct?'bg-green-50 dark:bg-green-900/20':'bg-red-50 dark:bg-red-900/20'}">
                  <span>${correct?'✅':'❌'}</span>
                  <div><p class="font-medium">${q.text.slice(0,60)}${q.text.length>60?'...':''}</p>
                  ${!correct ? `<p class="text-green-600 mt-0.5">Correct: ${q.options[q.correctIndex]||'?'}</p>` : ''}</div>
                </div>`;
              }).join('')}
            </div>
            <div class="flex gap-3">
              <button id="quiz-done-btn" class="px-6 py-2.5 rounded-xl bg-primary text-primary-foreground hover:bg-primary/90 text-sm font-bold">✓ Done</button>
            </div>
          </div>
        `;
        showModal(resultHtml);
        setTimeout(() => {
          const b = document.getElementById('quiz-done-btn');

        }, 50);
      } catch(e) { console.error(e); toast('Failed to submit quiz','error'); }

    window.importQuizFromCSV = async function() {
      const title = $('import-q-title')?.value?.trim();
      const file = $('import-q-file')?.files[0];
      if (!title) return toast('Quiz title required', 'error');
      if (!file) return toast('Please select a CSV file', 'error');
      const reader = new FileReader();
      reader.onload = async (evt) => {
        const lines = evt.target.result.split('\n').filter(l=>l.trim());
        const questions = [];
        for (const line of lines.slice(1)) {
          const parts = line.split(',').map(p=>p.trim().replace(/^"|"$/g,''));
          if (parts.length < 6) continue;
          const [text, a, b, c, d, ans] = parts;
          if (!text) continue;
          const correctIndex = {A:0,B:1,C:2,D:3}[ans?.toUpperCase()] ?? 0;
          const options = [a,b,c,d].filter(Boolean);
          if (options.length < 2) continue;
          questions.push({ text, options, correctIndex });
        }
        if (!questions.length) return toast('No valid questions found in CSV', 'error');
        // Validate at least one correct answer per question
        const invalid = questions.filter(q => q.correctIndex >= q.options.length);
        if (invalid.length) return toast(`${invalid.length} question(s) have invalid correct answers`, 'error');
        // Save quiz then open schedule modal
        try {
          const added = await addDoc(collection(db,'quizzes'), {
            title, questions, createdBy: currentUid(), createdAt: serverTimestamp()
          });
          closeModal();
          toast(`✅ Quiz imported: ${questions.length} questions`);
          // Automatically open schedule dialog
          setTimeout(() => window.openScheduleQuizModal(added.id), 200);
        } catch(e) { console.error(e); toast('Import failed','error'); }
      };
      reader.readAsText(file);
    };

      const blocks = Array.from(document.querySelectorAll('#q-questions > div'));
      if (!blocks.length) return toast('Add at least one question', 'error');
      const questions = [];
      for (const b of blocks) {
        const text = b.querySelector('input[data-q="text"]')?.value?.trim();
        if (!text) { toast('All questions must have text', 'error'); return; }
        const opts = Array.from(b.querySelectorAll('input[data-q="opt"]')).map(o => o.value.trim());
        const correctInput = b.querySelector('input[type="radio"]:checked');
        if (!correctInput) { toast('Please select a correct answer for each question', 'error'); return; }
        const correctIndex = parseInt(correctInput.value, 10);
        if (!opts[correctIndex]) { toast('Correct answer option cannot be empty', 'error'); return; }
        if (opts.filter(Boolean).length < 2) { toast('Each question needs at least 2 options', 'error'); return; }
        questions.push({ text, options: opts.filter(Boolean), correctIndex });
      }
      try {
        const added = await addDoc(collection(db,'quizzes'), {
          title, description: $('q-desc')?.value?.trim() || '',
          questions, createdBy: currentUid(), createdAt: serverTimestamp()
        });

          <div class="flex gap-3 flex-wrap items-center bg-card border border-border rounded-2xl px-4 py-3">
            <input id="mtg-search" type="text" placeholder="🔍 Search meetings..."
              oninput="window.filterMeetings()"
              class="h-9 px-3 rounded-lg border border-input bg-background text-sm flex-1 min-w-[180px] focus:outline-none focus:ring-1 focus:ring-ring">
            <select id="mtg-type-filter" onchange="window.filterMeetings()" class="h-9 px-3 rounded-lg border border-input bg-background text-sm">
              <option value="">All Types</option>
              ${(state.settings.meetingTypes||['Regular Meeting','Emergency Meeting','Board Meeting','Planning Session','Review Meeting']).map(t=>`<option>${t}</option>`).join('')}
            </select>
            <select id="mtg-sort" onchange="window.filterMeetings()" class="h-9 px-3 rounded-lg border border-input bg-background text-sm">
              <option value="newest">Newest First</option>
              <option value="oldest">Oldest First</option>
            </select>
          </div>

          <!-- Meetings grid -->
          <div id="mtg-grid" class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-5">
            ${renderMeetingCards(meetings)}
          </div>
          ${!meetings.length ? `
            <div class="text-center py-20 text-muted-foreground">
              <div class="text-6xl mb-4">📅</div>
              <p class="font-bold text-lg">No meetings recorded yet</p>
              <p class="text-sm mt-1">Create your first meeting to start tracking minutes</p>
            </div>` : ''}
        </div>
      `;
      $('content-area').innerHTML = html;
    }

    function renderMeetingCards(meetings) {
      const typeColors = {
        'Regular Meeting':   'bg-blue-500',
        'Emergency Meeting': 'bg-red-500',
        'Board Meeting':     'bg-purple-500',
        'Planning Session':  'bg-green-500',
        'Review Meeting':    'bg-orange-500',
      };
      return meetings.map(m => {
        const typeColor = typeColors[m.meetingType] || 'bg-muted-foreground';
        const attendeesList = m.attendeesList || [];
        const attendeeCount = attendeesList.length || (m.attendees||[]).length;
        const hasMinutes = !!(m.minutesContent || m.minutesFileUrl);
        return `
          <div class="bg-card border border-border rounded-2xl overflow-hidden shadow-sm hover:shadow-lg transition-all cursor-pointer group" onclick="window.viewMeeting('${m.id}')">
            <div class="p-5">
              <div class="flex items-start justify-between mb-3">
                <span class="text-[10px] font-bold uppercase tracking-widest px-2.5 py-1 rounded-full text-white ${typeColor}">${m.meetingType||'Meeting'}</span>
                ${hasMinutes ? '<span class="text-[10px] text-green-600 font-bold bg-green-50 dark:bg-green-900/20 px-2 py-0.5 rounded-full border border-green-200 dark:border-green-800">✓ Minutes</span>' : '<span class="text-[10px] text-orange-500 font-medium bg-orange-50 dark:bg-orange-900/20 px-2 py-0.5 rounded-full border border-orange-200 dark:border-orange-800">Pending</span>'}
              </div>
              <h4 class="font-bold text-base mb-1 group-hover:text-primary transition-colors line-clamp-2">${m.title}</h4>
              <div class="flex flex-wrap gap-2 text-xs text-muted-foreground mb-3">
                <span>📅 ${m.meetingDate ? new Date(m.meetingDate).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}) : '—'}</span>
                <span>🕐 ${m.startTime||''} ${m.endTime?'– '+m.endTime:''}</span>
                ${m.location ? `<span>📍 ${m.location}</span>` : ''}
              </div>
              <div class="flex items-center gap-2 text-xs text-muted-foreground">
                <div class="flex -space-x-1">
                  ${attendeesList.slice(0,4).map(a=>`<div class="w-6 h-6 rounded-full bg-primary/20 border-2 border-card flex items-center justify-center text-[9px] font-bold text-primary">${(a.name||'?').charAt(0).toUpperCase()}</div>`).join('')}
                  ${attendeeCount > 4 ? `<div class="w-6 h-6 rounded-full bg-muted border-2 border-card flex items-center justify-center text-[9px] font-bold">+${attendeeCount-4}</div>` : ''}
                </div>
                <span>${attendeeCount} attendee${attendeeCount!==1?'s':''}</span>
              </div>
            </div>
            ${m.agendaItems?.length ? `
            <div class="border-t border-border px-5 py-3 bg-muted/20">
              <p class="text-[10px] text-muted-foreground uppercase font-semibold tracking-wide mb-1">Agenda</p>
              <p class="text-xs text-foreground/70 line-clamp-2">${(m.agendaItems||[]).map((a,i)=>`${i+1}. ${a}`).join(' · ')}</p>
            </div>` : ''}
          </div>
        `;
      }).join('');
    }

    window.filterMeetings = function() {
      const q = ($('mtg-search')?.value||'').toLowerCase();
      const type = $('mtg-type-filter')?.value||'';
      const sort = $('mtg-sort')?.value||'newest';
      let filtered = (state.meetings||[]).filter(m => {
        const hay = `${m.title} ${m.meetingType} ${m.location||''} ${(m.agendaItems||[]).join(' ')}`.toLowerCase();
        return hay.includes(q) && (!type || m.meetingType===type);
      });
      filtered.sort((a,b) => {
        const da = new Date(a.meetingDate||''), db = new Date(b.meetingDate||'');
        return sort==='oldest' ? da-db : db-da;
      });
      const grid = $('mtg-grid');
      if (grid) grid.innerHTML = renderMeetingCards(filtered);
    };

    window.openNewMeetingModal = function(meetingId=null) {
      const m = meetingId ? (state.meetings||[]).find(x=>x.id===meetingId) : null;
      const isEdit = !!m;
      const agendaItems = (m?.agendaItems||['','']).map((a,i)=>`
        <div class="flex gap-2 items-center agenda-item">
          <span class="w-6 h-6 rounded-full bg-primary/10 text-primary text-xs font-bold flex items-center justify-center shrink-0">${i+1}</span>
          <input type="text" value="${a}" placeholder="Agenda item ${i+1}..." class="agenda-input flex-1 h-9 px-3 rounded-lg border border-input bg-background text-sm">
          <button onclick="this.closest('.agenda-item').remove()" class="text-destructive hover:text-destructive/80 px-1">✕</button>
        </div>
      `).join('');

      // Build attendee rows from saved data or empty rows
      const savedAttendees = m?.attendeesList || [];
      const initRows = savedAttendees.length > 0 ? savedAttendees : [{name:'',position:'',department:'',signature:''}];
      const attendeeRows = initRows.map((a,i) => `
        <tr class="attendee-row">
          <td class="px-2 py-1 text-center text-xs text-muted-foreground font-bold">${i+1}</td>
          <td class="px-2 py-1"><input class="att-name w-full h-8 px-2 rounded-lg border border-input bg-background text-xs" value="${(a.name||'').replace(/"/g,'&quot;')}" placeholder="Full name"></td>
          <td class="px-2 py-1"><input class="att-position w-full h-8 px-2 rounded-lg border border-input bg-background text-xs" value="${(a.position||'').replace(/"/g,'&quot;')}" placeholder="Position/Title"></td>
          <td class="px-2 py-1"><input class="att-dept w-full h-8 px-2 rounded-lg border border-input bg-background text-xs" value="${(a.department||'').replace(/"/g,'&quot;')}" placeholder="Department/Org"></td>
          <td class="px-2 py-1 text-center"><button onclick="this.closest('tr').remove()" class="text-destructive hover:text-destructive/80 text-sm px-1">✕</button></td>
        </tr>
      `).join('');

      showModal(`
        <div class="p-6 border-b border-border flex justify-between items-center bg-muted/30 rounded-t-xl">
          <h3 class="font-bold text-lg">${isEdit?'✏️ Edit Meeting':'📅 New Meeting'}</h3>
          <button onclick="closeModal()" class="text-muted-foreground hover:text-foreground">✕</button>
        </div>
        <div class="p-6 space-y-5 overflow-y-auto max-h-[70vh]">
          <!-- Title + Type -->
          <div class="grid grid-cols-2 gap-4">
            <div class="col-span-2">
              <label class="block text-sm font-semibold mb-1">Meeting Title *</label>
              <input id="mtg-title" value="${m?.title||''}" class="w-full h-10 px-3 rounded-xl border border-input bg-background text-sm" placeholder="e.g. Q3 Planning Session">
            </div>
            <div>
              <label class="block text-sm font-semibold mb-1">Type *</label>
              <select id="mtg-type" class="w-full h-10 px-3 rounded-xl border border-input bg-background text-sm">
                ${['Regular Meeting','Emergency Meeting','Board Meeting','Planning Session','Review Meeting'].map(t=>`<option ${m?.meetingType===t?'selected':''}>${t}</option>`).join('')}
              </select>
            </div>
            <div>
              <label class="block text-sm font-semibold mb-1">Location / Platform</label>
              <input id="mtg-location" value="${m?.location||''}" class="w-full h-10 px-3 rounded-xl border border-input bg-background text-sm" placeholder="e.g. Zoom / Conference Room A">
            </div>
            <div>
              <label class="block text-sm font-semibold mb-1">Date *</label>
              <input id="mtg-date" type="date" value="${m?.meetingDate||''}" class="w-full h-10 px-3 rounded-xl border border-input bg-background text-sm">
            </div>
            <div class="grid grid-cols-2 gap-2">
              <div>
                <label class="block text-sm font-semibold mb-1">Start Time</label>
                <input id="mtg-start" type="time" value="${m?.startTime||''}" class="w-full h-10 px-3 rounded-xl border border-input bg-background text-sm">
              </div>
              <div>
                <label class="block text-sm font-semibold mb-1">End Time</label>
                <input id="mtg-end" type="time" value="${m?.endTime||''}" class="w-full h-10 px-3 rounded-xl border border-input bg-background text-sm">
              </div>
            </div>
            <div>
              <label class="block text-sm font-semibold mb-1">Facilitator</label>
              <select id="mtg-facilitator" class="w-full h-10 px-3 rounded-xl border border-input bg-background text-sm">
                <option value="">— Select —</option>
                ${state.users.filter(u=>u.status!=='inactive').map(u=>`<option value="${u.id}" ${m?.facilitatorId===u.id?'selected':''}>${u.name||u.email}</option>`).join('')}
              </select>
            </div>
            <div>
              <label class="block text-sm font-semibold mb-1">Minutes Taker</label>
              <select id="mtg-secretary" class="w-full h-10 px-3 rounded-xl border border-input bg-background text-sm">
                <option value="">— Select —</option>
                ${state.users.filter(u=>u.status!=='inactive').map(u=>`<option value="${u.id}" ${m?.secretaryId===u.id?'selected':''}>${u.name||u.email}</option>`).join('')}
              </select>
            </div>
          </div>
          <!-- Agenda -->
          <div>
            <div class="flex items-center justify-between mb-2">
              <label class="text-sm font-semibold">Agenda Items</label>
              <button onclick="window.addAgendaItem()" class="text-xs text-primary hover:underline">＋ Add Item</button>
            </div>
            <div id="agenda-container" class="space-y-2">${agendaItems}</div>
          </div>
          <!-- Attendees Table -->
          <div>
            <div class="flex items-center justify-between mb-2">
              <label class="text-sm font-semibold">👥 Attendees</label>
              <button onclick="window.addAttendeeRow()" class="text-xs text-primary hover:underline font-medium">＋ Add Row</button>
            </div>
            <div class="border border-border rounded-xl overflow-hidden">
              <table class="w-full text-xs">
                <thead class="bg-muted/40 border-b border-border">
                  <tr>
                    <th class="px-2 py-2 text-center w-8 text-muted-foreground">#</th>
                    <th class="px-2 py-2 text-left text-muted-foreground">Full Name</th>
                    <th class="px-2 py-2 text-left text-muted-foreground">Position / Title</th>
                    <th class="px-2 py-2 text-left text-muted-foreground">Department / Org</th>
                    <th class="px-2 py-2 w-8"></th>
                  </tr>
                </thead>
                <tbody id="attendee-table-body">
                  ${attendeeRows}
                </tbody>
              </table>
            </div>
          </div>
        </div>
        <div class="p-5 border-t border-border bg-muted/30 flex justify-end gap-2">
          <button onclick="closeModal()" class="px-4 py-2 rounded-xl border border-border text-sm">Cancel</button>
          <button onclick="window.saveMeeting('${meetingId||''}')" class="px-5 py-2 rounded-xl bg-primary text-primary-foreground text-sm font-bold">
            ${isEdit?'💾 Save Changes':'📅 Create Meeting'}
          </button>
        </div>
      `);
    };

    window.addAttendeeRow = function() {
      const tbody = $('attendee-table-body');
      if (!tbody) return;
      const rowNum = tbody.querySelectorAll('.attendee-row').length + 1;
      const tr = document.createElement('tr');
      tr.className = 'attendee-row';
      tr.innerHTML = `
        <td class="px-2 py-1 text-center text-xs text-muted-foreground font-bold">${rowNum}</td>
        <td class="px-2 py-1"><input class="att-name w-full h-8 px-2 rounded-lg border border-input bg-background text-xs" placeholder="Full name"></td>
        <td class="px-2 py-1"><input class="att-position w-full h-8 px-2 rounded-lg border border-input bg-background text-xs" placeholder="Position/Title"></td>
        <td class="px-2 py-1"><input class="att-dept w-full h-8 px-2 rounded-lg border border-input bg-background text-xs" placeholder="Department/Org"></td>
        <td class="px-2 py-1 text-center"><button onclick="this.closest('tr').remove()" class="text-destructive text-sm px-1">✕</button></td>
      `;
      tbody.appendChild(tr);
    };

    window.saveMeeting = async function(meetingId='') {
      const title = $('mtg-title')?.value?.trim();
      const meetingDate = $('mtg-date')?.value;
      if (!title) return toast('Meeting title required','error');
      if (!meetingDate) return toast('Meeting date required','error');
      const agendaItems = Array.from(document.querySelectorAll('.agenda-input')).map(i=>i.value.trim()).filter(Boolean);
      // Collect attendees from table
      const attendeesList = [];
      document.querySelectorAll('.attendee-row').forEach(row => {
        const name = row.querySelector('.att-name')?.value?.trim()||'';
        const position = row.querySelector('.att-position')?.value?.trim()||'';
        const department = row.querySelector('.att-dept')?.value?.trim()||'';
        if (name) attendeesList.push({ name, position, department });
      });
      const payload = {
        title,
        meetingType: $('mtg-type')?.value||'Regular Meeting',
        meetingDate,
        startTime: $('mtg-start')?.value||'',
        endTime: $('mtg-end')?.value||'',
        location: $('mtg-location')?.value||'',
        facilitatorId: $('mtg-facilitator')?.value||'',
        secretaryId: $('mtg-secretary')?.value||'',
        agendaItems,
        attendeesList,
        attendees: attendeesList.map(a => a.name), // keep for backward compat display
        updatedAt: new Date().toISOString(),
      };
      try {
        if (meetingId) {
          await updateDoc(doc(db,'meetings',meetingId), payload);
          toast('✅ Meeting updated');
        } else {
          payload.createdBy = currentUid();
          payload.createdAt = serverTimestamp();
          await addDoc(collection(db,'meetings'), payload);
          toast('📅 Meeting created');
        }
        closeModal();
        navigate('meetings');
      } catch(e) { console.error(e); toast('Failed to save','error'); }
    };

    window.addAgendaItem = function() {
      const container = $('agenda-container');
      const num = container.children.length + 1;
      const div = document.createElement('div');
      div.className = 'flex gap-2 items-center agenda-item';
      div.innerHTML = `
        <span class="w-6 h-6 rounded-full bg-primary/10 text-primary text-xs font-bold flex items-center justify-center shrink-0">${num}</span>
        <input type="text" placeholder="Agenda item ${num}..." class="agenda-input flex-1 h-9 px-3 rounded-lg border border-input bg-background text-sm">
        <button onclick="this.closest('.agenda-item').remove()" class="text-destructive px-1">✕</button>
      `;
      container.appendChild(div);
    };

    window.viewMeeting = function(id) {
      const m = (state.meetings||[]).find(x=>x.id===id);
      if (!m) return;
      const isAdmin = state.currentUserDoc?.role === 'admin';
      const canEdit = isAdmin || m.createdBy===currentUid() || m.facilitatorId===currentUid() || m.secretaryId===currentUid();
      const typeColors = {'Regular Meeting':'bg-blue-500','Emergency Meeting':'bg-red-500','Board Meeting':'bg-purple-500','Planning Session':'bg-green-500','Review Meeting':'bg-orange-500'};
      const typeColor = typeColors[m.meetingType]||'bg-muted-foreground';
      const facilitator = state.users.find(u=>u.id===m.facilitatorId);
      const secretary = state.users.find(u=>u.id===m.secretaryId);

      const html = `
        <div class="max-w-5xl mx-auto animate-slide-in space-y-5">
          <div class="flex items-center gap-3">

            ${canEdit ? `<div class="ml-auto flex gap-2">
              <button onclick="window.openNewMeetingModal('${m.id}')" class="h-8 px-3 rounded-lg border border-border hover:bg-muted text-xs font-medium">✏️ Edit</button>
              <button onclick="window.openMinutesModal('${m.id}')" class="h-8 px-3 rounded-lg bg-primary text-primary-foreground hover:bg-primary/90 text-xs font-bold">📝 Write Minutes</button>
              <button onclick="window.deleteMeeting('${m.id}')" class="h-8 px-3 rounded-lg border border-destructive/30 text-destructive hover:bg-destructive/10 text-xs font-medium">🗑️</button>
            </div>` : ''}
          </div>

          <div class="bg-card border border-border rounded-2xl overflow-hidden shadow-sm">
            <!-- Header banner -->
            <div class="bg-gradient-to-r from-primary/15 to-transparent p-7 border-b border-border">
              <div class="flex items-start gap-4">
                <div class="w-14 h-14 rounded-2xl ${typeColor} flex items-center justify-center text-3xl text-white shadow-md">📅</div>
                <div class="flex-1">
                  <span class="text-[10px] font-bold uppercase tracking-widest text-white ${typeColor} px-2 py-0.5 rounded-full">${m.meetingType||'Meeting'}</span>
                  <h1 class="text-2xl font-black mt-1 mb-2">${m.title}</h1>

                    <span>📅 ${m.meetingDate ? new Date(m.meetingDate).toLocaleDateString('en-US',{weekday:'long',year:'numeric',month:'long',day:'numeric'}) : '—'}</span>
                    ${m.startTime ? `<span>🕐 ${m.startTime}${m.endTime?' – '+m.endTime:''}</span>` : ''}
                    ${m.location ? `<span>📍 ${m.location}</span>` : ''}
                  </div>
                </div>
              </div>
            </div>

            <!-- Meeting details grid -->
            <div class="p-7 grid grid-cols-1 md:grid-cols-2 gap-7">
              <!-- Left: Agenda + Key Info -->
              <div class="space-y-5">
                ${m.agendaItems?.length ? `
                <div>
                  <h3 class="font-bold text-sm uppercase tracking-wide text-muted-foreground mb-3">📋 Agenda</h3>
                  <ol class="space-y-2">
                    ${m.agendaItems.map((a,i)=>`<li class="flex gap-2.5 text-sm">
                      <span class="w-6 h-6 rounded-full bg-primary/10 text-primary text-xs font-bold flex items-center justify-center shrink-0">${i+1}</span>
                      <span class="leading-relaxed">${a}</span>
                    </li>`).join('')}
                  </ol>
                </div>` : ''}

                <div class="grid grid-cols-2 gap-3">
                  ${facilitator ? `<div class="bg-muted/30 rounded-xl p-3">
                    <p class="text-[10px] text-muted-foreground uppercase font-bold mb-1">Facilitator</p>
                    <div class="flex items-center gap-2">${getUserAvatar(facilitator.id,'w-7 h-7 text-xs')}<span class="text-sm font-medium">${facilitator.name||facilitator.email}</span></div>
                  </div>` : ''}
                  ${secretary ? `<div class="bg-muted/30 rounded-xl p-3">
                    <p class="text-[10px] text-muted-foreground uppercase font-bold mb-1">Minutes Taker</p>
                    <div class="flex items-center gap-2">${getUserAvatar(secretary.id,'w-7 h-7 text-xs')}<span class="text-sm font-medium">${secretary.name||secretary.email}</span></div>
                  </div>` : ''}
                </div>

                <!-- Attendees -->
                <div>
                  <h3 class="font-bold text-sm uppercase tracking-wide text-muted-foreground mb-3">👥 Attendees (${(m.attendeesList||m.attendees||[]).length})</h3>
                  ${(m.attendeesList||[]).length > 0 ? `
                  <div class="border border-border rounded-xl overflow-hidden">
                    <table class="w-full text-xs">
                      <thead class="bg-muted/40 border-b border-border">
                        <tr>
                          <th class="px-3 py-2 text-center text-muted-foreground w-8">#</th>
                          <th class="px-3 py-2 text-left text-muted-foreground">Name</th>
                          <th class="px-3 py-2 text-left text-muted-foreground">Position</th>
                          <th class="px-3 py-2 text-left text-muted-foreground">Department / Org</th>
                        </tr>
                      </thead>
                      <tbody class="divide-y divide-border">
                        ${(m.attendeesList||[]).map((a,i)=>`
                          <tr class="hover:bg-muted/20">
                            <td class="px-3 py-2 text-center text-muted-foreground font-bold">${i+1}</td>
                            <td class="px-3 py-2 font-medium">${a.name||'—'}</td>
                            <td class="px-3 py-2 text-muted-foreground">${a.position||'—'}</td>

                      </div>`).join('')}
                    ${!(m.attendees||[]).length ? '<p class="text-xs text-muted-foreground">No attendees recorded</p>' : ''}
                  </div>`}
                </div>
              </div>

              <!-- Right: Minutes -->
              <div class="space-y-4">
                <div>
                  <div class="flex items-center justify-between mb-3">
                    <h3 class="font-bold text-sm uppercase tracking-wide text-muted-foreground">📝 Minutes of Meeting</h3>
                    ${canEdit ? `<button onclick="window.openMinutesModal('${m.id}')" class="text-xs text-primary hover:underline font-medium">${m.minutesContent?'Edit':'Write'} Minutes</button>` : ''}
                  </div>
                  ${m.minutesContent ? `
                  <div class="bg-muted/20 rounded-xl p-4 border border-border">
                    <div class="ql-render ql-editor text-sm leading-relaxed">${m.minutesContent}</div>

                  <div class="bg-muted/10 rounded-xl p-6 border border-dashed border-border text-center">
                    <div class="text-3xl mb-2">📝</div>
                    <p class="text-sm text-muted-foreground">No minutes recorded yet</p>
                    ${canEdit ? `<button onclick="window.openMinutesModal('${m.id}')" class="mt-2 text-xs text-primary hover:underline">Add minutes now</button>` : ''}
                  </div>`}
                </div>
                ${m.minutesFileUrl ? `

    window.addActionItem = function() {
      const tbody = $('action-items-body');
      if (!tbody) return;
      const rowCount = tbody.querySelectorAll('.action-item-row').length + 1;
      const tr = document.createElement('tr');
      tr.className = 'action-item-row';
      tr.innerHTML = `
        <td class="px-3 py-2 font-bold text-muted-foreground">${rowCount}</td>
        <td class="px-3 py-2"><input class="ai-details w-full bg-transparent border-none outline-none text-xs" placeholder="Item details..."></td>

    window.saveMinutes = async function(meetingId) {
      const html = EditorManager.getHTML('minutes-editor-mount');
      // Collect action items
      const actionItems = [];
      document.querySelectorAll('.action-item-row').forEach((row, i) => {
        const details = row.querySelector('.ai-details')?.value?.trim()||'';
        const action = row.querySelector('.ai-action')?.value?.trim()||'';
        const dueDate = row.querySelector('.ai-due')?.value?.trim()||'';
        const responsible = row.querySelector('.ai-resp')?.value?.trim()||'';
        const nextStep = row.querySelector('.ai-next')?.value?.trim()||'';
        if (details || action) actionItems.push({itemNo:i+1,details,action,dueDate,responsible,nextStep});
      });
      try {
        await updateDoc(doc(db,'meetings',meetingId), { minutesContent: html||'', actionItems, minutesUpdatedAt: new Date().toISOString() });
        toast('📝 Minutes saved');
        await logActivity('minutes','Meetings','Saved meeting minutes');
        closeModal();
        setTimeout(() => window.viewMeeting(meetingId), 200);
      } catch(e) { console.error(e); toast('Failed to save','error'); }
    };

    window.saveScheduleQuiz = async function() {
      const quizId = $('sq-quiz').value;
      const scheduledDate = $('sq-date').value;
      const scheduledTime = $('sq-time').value;
      const taggedUsers = getMultiSelectValues('sq-users');
      const msg = $('sq-msg').value.trim();
      if (!quizId) return toast('Select a quiz', 'error');
      if (!scheduledDate) return toast('Scheduled date required', 'error');
      const quiz = state.quizzes.find(q => q.id === quizId);
      try {
        await addDoc(collection(db, 'quiz_schedules'), {
          quizId, scheduledDate, scheduledTime, taggedUsers,
          message: msg, createdBy: currentUid(), createdAt: serverTimestamp()
        });
        // Notify tagged users (or all if none tagged)
        const targets = taggedUsers.length > 0
          ? state.users.filter(u => taggedUsers.includes(u.id))
          : state.users.filter(u => u.status !== 'inactive' && u.id !== currentUid());
        for (const u of targets) {
          const notifMsg = msg || `🧠 Quiz assigned: "${quiz?.title || 'Quiz'}" — scheduled for ${scheduledDate}${scheduledTime ? ' at ' + scheduledTime : ''}. Click to take it!`;
          await notify(u.id, notifMsg, `quizzes`, 'quiz');
        }
        closeModal();
        toast(`Quiz scheduled and ${targets.length} user(s) notified!`);
        navigate('admin-quizzes');
      } catch(e) { console.error(e); toast('Failed to schedule quiz','error'); }
    };

    async function checkQuizReminders() {
      const uid = currentUid();
      if (!uid) return;
      const takenIds = new Set((state.quizResults||[]).map(r => r.quizId));
      const unfinished = state.quizzes.filter(q => !takenIds.has(q.id));
      if (unfinished.length > 0) {
        // Check if we already sent this recently (avoid spam) - use localStorage flag per day
        const today = new Date().toISOString().slice(0,10);
        const flag = `quiz_reminded_${uid}_${today}`;
        if (!localStorage.getItem(flag)) {
          localStorage.setItem(flag, '1');
          await notify(uid, `🧠 Reminder: You have ${unfinished.length} quiz${unfinished.length>1?'zes':''} waiting! "${unfinished[0].title}" and more.`, `quizzes`, 'quiz');
        }
      }
    }

      const colorMap = {
        yellow: 'bg-yellow-50 dark:bg-yellow-900/20 border-yellow-200 dark:border-yellow-800',
        blue: 'bg-blue-50 dark:bg-blue-900/20 border-blue-200 dark:border-blue-800',
        green: 'bg-green-50 dark:bg-green-900/20 border-green-200 dark:border-green-800',
        pink: 'bg-pink-50 dark:bg-pink-900/20 border-pink-200 dark:border-pink-800',
        purple: 'bg-purple-50 dark:bg-purple-900/20 border-purple-200 dark:border-purple-800',
      };
      return notes.map(n => {
        const cls = colorMap[n.color] || 'bg-card border-border';
        return `
          <div class="rounded-2xl border ${cls} p-5 shadow-sm hover:shadow-md transition-all group cursor-pointer" onclick="window.openNoteModal('${n.id}')">
            <div class="flex items-start justify-between mb-2">
              <h4 class="font-bold text-sm truncate flex-1">${n.title || 'Untitled'}</h4>
              <button onclick="event.stopPropagation(); window.deleteNote('${n.id}')" class="opacity-0 group-hover:opacity-100 p-1 text-muted-foreground hover:text-destructive transition-all ml-1 rounded">
                <i class="fa-solid fa-trash text-xs"></i>
              </button>
            </div>
            <p class="text-xs text-muted-foreground mb-3 line-clamp-4">${(n.content||'').replace(/<[^>]+>/g,'').slice(0,200)}</p>
            <div class="flex items-center justify-between">
              <span class="text-[10px] text-muted-foreground">${timeAgo(n.updatedAt||n.createdAt)}</span>
              ${n.pinned ? '<span class="text-[10px] font-bold text-primary">📌 Pinned</span>' : ''}
            </div>
          </div>`;
      }).join('') || '<div class="col-span-3 text-center py-8 text-muted-foreground text-sm">No notes match your search</div>';
    }

    window.filterNotes = function() {
      const search = ($('note-search')?.value||'').toLowerCase();
      const color = $('note-color')?.value||'';
      const filtered = (state.notes||[]).filter(n => {
        const hay = `${n.title||''} ${(n.content||'').replace(/<[^>]+>/g,'')}`.toLowerCase();
        return hay.includes(search) && (!color || n.color === color);
      });
      const grid = $('notes-grid');
      if (grid) grid.innerHTML = renderNoteCards(filtered);
    };

    window.openNoteModal = function(noteId=null) {
      const isEdit = !!noteId;
      const n = isEdit ? (state.notes||[]).find(x=>x.id===noteId) : {};
      const colors = ['yellow','blue','green','pink','purple'];
      const colorLabels = {yellow:'🟡 Yellow',blue:'🔵 Blue',green:'🟢 Green',pink:'🩷 Pink',purple:'🟣 Purple'};
      showModal(`
        <div class="p-6 border-b border-border flex justify-between items-center bg-muted/30 rounded-t-xl">
          <h3 class="font-bold text-lg">${isEdit?'Edit Note':'New Note'}</h3>
          <div class="flex items-center gap-2">
            ${isEdit ? `<button onclick="window.deleteNote('${noteId}'); window.closeModal();" class="px-3 py-1.5 rounded-lg border border-destructive/30 text-destructive text-xs hover:bg-destructive/10">🗑️ Delete</button>` : ''}
            <button onclick="window.closeModal()" class="text-muted-foreground hover:text-foreground"><i class="fa-solid fa-xmark text-xl"></i></button>
          </div>
        </div>
        <div class="p-6 space-y-4">
          <input id="note-title" value="${(n?.title||'').replace(/"/g,'&quot;')}" placeholder="Note title..." class="w-full h-10 px-3 rounded-xl border border-input bg-background text-sm font-semibold focus:outline-none focus:ring-2 focus:ring-ring">
          <div>
            <label class="text-xs font-semibold text-muted-foreground mb-2 block">Color</label>
            <div class="flex gap-2">
              ${colors.map(c => `
                <label class="cursor-pointer">
                  <input type="radio" name="note-color-sel" value="${c}" class="sr-only" ${n?.color===c||(!n?.color&&c==='yellow')?'checked':''}>
                  <div class="px-2.5 py-1.5 rounded-lg text-xs font-medium border-2 transition-all ${n?.color===c||(!n?.color&&c==='yellow')?'border-primary':'border-transparent hover:border-border'} note-color-opt" data-color="${c}">${colorLabels[c]}</div>
                </label>`).join('')}
            </div>
          </div>
          <div>
            <label class="text-xs font-semibold text-muted-foreground mb-2 block">Content</label>
            <div id="note-editor-mount"></div>
          </div>
          <label class="flex items-center gap-2 cursor-pointer">
            <input type="checkbox" id="note-pinned" ${n?.pinned?'checked':''} class="rounded border-border accent-primary">
            <span class="text-sm text-muted-foreground">📌 Pin this note to top</span>
          </label>
        </div>
        <div class="p-6 border-t border-border bg-muted/30 rounded-b-xl flex justify-end gap-3">
          <button onclick="window.closeModal()" class="px-4 py-2 rounded-xl border border-input bg-background hover:bg-muted text-sm font-medium">Cancel</button>
          <button onclick="window.saveNote('${noteId||''}')" class="px-5 py-2 rounded-xl bg-primary text-primary-foreground hover:bg-primary/90 text-sm font-bold shadow-sm">💾 Save Note</button>
        </div>
      `);
      EditorManager.init('note-editor-mount', { placeholder: 'Write your note here...', minHeight: '200px' });
      if (n?.content) EditorManager.setHTML('note-editor-mount', n.content);
      // Color picker highlight
      document.querySelectorAll('.note-color-opt').forEach(el => {
        el.addEventListener('click', () => {
          document.querySelectorAll('.note-color-opt').forEach(x=>x.closest('label').querySelector('input').checked=false);
          el.closest('label').querySelector('input').checked=true;
          document.querySelectorAll('.note-color-opt').forEach(x => {
            x.classList.toggle('border-primary', x.dataset.color === el.dataset.color);
            x.classList.toggle('border-transparent', x.dataset.color !== el.dataset.color);
          });
        });
      });
    };

    window.saveNote = async function(noteId) {
      const title = $('note-title')?.value?.trim() || 'Untitled';
      const content = EditorManager.getHTML('note-editor-mount');
      const color = document.querySelector('input[name="note-color-sel"]:checked')?.value || 'yellow';
      const pinned = $('note-pinned')?.checked || false;
      const uid = currentUid();
      try {
        if (noteId) {
          await updateDoc(doc(db,'notes',noteId), { title, content, color, pinned, updatedAt: serverTimestamp() });
          toast('Note updated');
        } else {
          await addDoc(collection(db,'notes'), { title, content, color, pinned, userId: uid, createdAt: serverTimestamp(), updatedAt: serverTimestamp() });
          toast('Note saved');
        }
        closeModal();
        await logActivity('note', 'My Notes', noteId ? 'Edited note' : 'Created note: '+title);
      } catch(e) { console.error(e); toast('Failed to save note','error'); }
    };

    window.deleteNote = async function(id) {
      if (!confirm('Delete this note?')) return;
      try { await deleteDoc(doc(db,'notes',id)); toast('Note deleted'); }
      catch(e) { toast('Failed to delete','error'); }
    };

    /***********************
     * EXPENSE TRACKING MODULE
     ***********************/
    let _expTab = 'RCA';

    function renderExpenses() {
      const isAdmin = state.currentUserDoc?.role === 'admin';
      const uid = currentUid();
      const expenses = state.expenses || [];

        const rows = expenses.filter(e => e.expenseType === type);

        const totalSpent  = rows.reduce((s,e) => s + (parseFloat(e.amount)||0), 0);
        const remaining   = totalBudget - totalSpent;
        const open   = rows.filter(e => e.status === 'Open').length;
        const closed = rows.filter(e => e.status === 'Closed').length;
        return { rows, totalBudget, totalSpent, remaining, open, closed };
      }
      const rca  = tabSummary('RCA');
      const vale = tabSummary('VALE');

      const activeRows = _expTab === 'RCA' ? rca : vale;
      const activeSummary = _expTab === 'RCA' ? rca : vale;

      const html = `
        <div class="max-w-6xl mx-auto space-y-5 animate-slide-in">

              </div>

                <button onclick="window.openExpenseModal()" class="px-5 py-2.5 bg-primary text-primary-foreground rounded-xl font-bold text-sm shadow hover:shadow-md hover:bg-primary/90 transition-all">
                  ＋ Add Expense
                </button>
              </div>
            </div>
          </div>

          <!-- Overview KPI -->
          <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
            <div class="bg-card border border-border rounded-2xl p-4 shadow-sm text-center">
              <div class="text-xs text-muted-foreground font-semibold uppercase tracking-wide mb-1">RCA Budget</div>
              <div class="text-xl font-black text-blue-500">₱${rca.totalBudget.toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2})}</div>
              <div class="text-xs text-muted-foreground mt-1">${rca.rows.length} transactions</div>
            </div>
            <div class="bg-card border border-border rounded-2xl p-4 shadow-sm text-center">
              <div class="text-xs text-muted-foreground font-semibold uppercase tracking-wide mb-1">RCA Spent</div>
              <div class="text-xl font-black text-red-500">₱${rca.totalSpent.toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2})}</div>
              <div class="text-xs mt-1 font-semibold ${rca.remaining>=0?'text-green-600':'text-red-500'}">Remaining: ₱${rca.remaining.toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2})}</div>
            </div>
            <div class="bg-card border border-border rounded-2xl p-4 shadow-sm text-center">
              <div class="text-xs text-muted-foreground font-semibold uppercase tracking-wide mb-1">VALE Budget</div>
              <div class="text-xl font-black text-purple-500">₱${vale.totalBudget.toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2})}</div>
              <div class="text-xs text-muted-foreground mt-1">${vale.rows.length} transactions</div>
            </div>
            <div class="bg-card border border-border rounded-2xl p-4 shadow-sm text-center">
              <div class="text-xs text-muted-foreground font-semibold uppercase tracking-wide mb-1">VALE Spent</div>
              <div class="text-xl font-black text-orange-500">₱${vale.totalSpent.toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2})}</div>
              <div class="text-xs mt-1 font-semibold ${vale.remaining>=0?'text-green-600':'text-red-500'}">Remaining: ₱${vale.remaining.toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2})}</div>
            </div>
          </div>

          <!-- Tabs -->
          <div class="flex gap-1 bg-muted/50 border border-border rounded-2xl p-1.5 w-fit">
            <button onclick="window.switchExpTab('RCA')" class="px-6 py-2 rounded-xl text-sm font-bold transition-all ${_expTab==='RCA'?'bg-blue-500 text-white shadow':'hover:bg-muted text-muted-foreground'}">
              📋 RCA <span class="ml-1.5 text-[10px] px-1.5 py-0.5 rounded-full ${_expTab==='RCA'?'bg-white/20 text-white':'bg-muted-foreground/20'}">${rca.rows.length}</span>
            </button>
            <button onclick="window.switchExpTab('VALE')" class="px-6 py-2 rounded-xl text-sm font-bold transition-all ${_expTab==='VALE'?'bg-purple-500 text-white shadow':'hover:bg-muted text-muted-foreground'}">
              📋 VALE <span class="ml-1.5 text-[10px] px-1.5 py-0.5 rounded-full ${_expTab==='VALE'?'bg-white/20 text-white':'bg-muted-foreground/20'}">${vale.rows.length}</span>
            </button>
          </div>

          <!-- Active Tab Summary Bar -->
          <div class="bg-card border border-border rounded-2xl p-4 shadow-sm">
            <div class="flex flex-wrap gap-6 items-center">
              <div class="flex items-center gap-3">
                <div class="w-10 h-10 rounded-xl ${_expTab==='RCA'?'bg-blue-100 text-blue-600':'bg-purple-100 text-purple-600'} flex items-center justify-center font-black text-sm">${_expTab}</div>
                <div>
                  <div class="font-bold text-base">${_expTab} Expense Tracker</div>
                  <div class="text-xs text-muted-foreground">${activeSummary.open} Open · ${activeSummary.closed} Closed</div>
                </div>
              </div>
              <div class="flex gap-5 ml-auto text-sm">
                <div class="text-center">
                  <div class="font-black text-base">₱${activeSummary.totalBudget.toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2})}</div>
                  <div class="text-xs text-muted-foreground">Total Budget</div>
                </div>
                <div class="text-center">
                  <div class="font-black text-base text-red-500">₱${activeSummary.totalSpent.toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2})}</div>
                  <div class="text-xs text-muted-foreground">Total Expensed</div>
                </div>
                <div class="text-center">
                  <div class="font-black text-base ${activeSummary.remaining>=0?'text-green-600':'text-red-500'}">₱${activeSummary.remaining.toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2})}</div>
                  <div class="text-xs text-muted-foreground">Remaining</div>
                </div>
              </div>
            </div>
            <!-- Progress bar -->
            ${activeSummary.totalBudget > 0 ? `
            <div class="mt-3">
              <div class="flex justify-between text-[10px] text-muted-foreground mb-1">
                <span>Budget utilization</span>
                <span>${Math.min(100,Math.round((activeSummary.totalSpent/activeSummary.totalBudget)*100))}%</span>
              </div>
              <div class="h-2 bg-muted rounded-full overflow-hidden">
                <div class="h-full rounded-full transition-all ${activeSummary.totalSpent/activeSummary.totalBudget > 0.9 ? 'bg-red-500' : activeSummary.totalSpent/activeSummary.totalBudget > 0.7 ? 'bg-yellow-500' : 'bg-green-500'}"
                  style="width:${Math.min(100,Math.round((activeSummary.totalSpent/activeSummary.totalBudget)*100))}%"></div>
              </div>
            </div>` : ''}
          </div>

          <div class="flex gap-3 flex-wrap items-center bg-card border border-border rounded-xl p-3">
            <input id="exp-search" type="text" placeholder="🔍 Search by particulars or description..." oninput="window.filterExpenses()"
              class="h-9 px-3 rounded-lg border border-input bg-background text-sm flex-1 min-w-[200px] focus:outline-none focus:ring-1 focus:ring-ring">

              <option value="Closed">🟢 Closed</option>

                    <th class="px-5 py-3">Submitted By</th>
                    <th class="px-5 py-3">Budget (₱)</th>
                    <th class="px-5 py-3">Expensed (₱)</th>
                    <th class="px-5 py-3">Remaining (₱)</th>
                    <th class="px-5 py-3">Status</th>
                    <th class="px-5 py-3 text-right">Actions</th>
                  </tr>
                </thead>
                <tbody id="exp-table-body" class="divide-y divide-border">
                  ${renderExpenseRows(activeRows.rows)}
                </tbody>
              </table>
            </div>
          </div>
        </div>
      `;
      $('content-area').innerHTML = html;
    }

    window.switchExpTab = function(tab) {
      _expTab = tab;
      renderExpenses();
    };

    function renderExpenseRows(expenses) {
      const isAdmin = state.currentUserDoc?.role === 'admin';
      const uid = currentUid();
      if (!expenses.length) return `<tr><td colspan="9" class="px-6 py-10 text-center text-muted-foreground">No expenses found</td></tr>`;
      const statusColors = {
        Open:   'bg-orange-50 text-orange-700 border-orange-200 dark:bg-orange-900/30 dark:text-orange-300',
        Closed: 'bg-green-50 text-green-700 border-green-200 dark:bg-green-900/30 dark:text-green-300',
      };
      return expenses.map(e => {
        const budget    = parseFloat(e.budgetAmount||0);
        const expensed  = parseFloat(e.amount||0);
        const remaining = budget - expensed;
        return `
        <tr class="hover:bg-muted/30 transition-colors">
          <td class="px-5 py-3 text-xs text-muted-foreground whitespace-nowrap">${e.date || formatDate(e.createdAt)}</td>
          <td class="px-5 py-3 font-semibold text-sm">${e.particulars||'—'}</td>
          <td class="px-5 py-3 text-xs text-muted-foreground max-w-[150px] truncate" title="${e.description||''}">${e.description || '—'}</td>
          <td class="px-5 py-3">
            <div class="flex items-center gap-1.5">${getUserAvatar(e.submittedBy,'w-6 h-6 text-[10px]')}<span class="text-xs">${getUserName(e.submittedBy)}</span></div>
          </td>
          <td class="px-5 py-3 font-bold text-blue-600">₱${budget.toLocaleString('en-US',{minimumFractionDigits:2})}</td>
          <td class="px-5 py-3 font-bold text-red-500">₱${expensed.toLocaleString('en-US',{minimumFractionDigits:2})}</td>
          <td class="px-5 py-3 font-bold ${remaining>=0?'text-green-600':'text-red-500'}">₱${remaining.toLocaleString('en-US',{minimumFractionDigits:2})}</td>
          <td class="px-5 py-3">
            <span class="px-2.5 py-0.5 rounded-full text-xs font-bold border ${statusColors[e.status]||statusColors['Open']}">
              ${e.status==='Closed'?'🟢':'🟡'} ${e.status||'Open'}
            </span>
          </td>
          <td class="px-5 py-3 text-right">
            <div class="flex items-center justify-end gap-1">
              <button onclick="window.viewExpense('${e.id}')" class="p-1.5 rounded-lg hover:bg-muted text-muted-foreground hover:text-primary text-xs">👁️</button>
              ${isAdmin || e.submittedBy === uid ? `
                <button onclick="window.openExpenseModal('${e.id}')" class="p-1.5 rounded-lg hover:bg-muted text-muted-foreground hover:text-primary text-xs">✏️</button>
                <button onclick="window.deleteExpense('${e.id}')" class="p-1.5 rounded-lg hover:bg-red-50 text-muted-foreground hover:text-red-500 text-xs">🗑️</button>
              ` : ''}
            </div>
          </td>
        </tr>`;
      }).join('');
    }

    window.filterExpenses = function() {
      const search = ($('exp-search')?.value||'').toLowerCase();
      const status = $('exp-status-filter')?.value||'';
      const typeExpenses = (state.expenses||[]).filter(e => e.expenseType === _expTab);
      const filtered = typeExpenses.filter(e => {
        const hay = `${e.particulars||''} ${e.description||''}`.toLowerCase();
        return hay.includes(search) && (!status||e.status===status);
      });
      const tbody = $('exp-table-body');
      if (tbody) tbody.innerHTML = renderExpenseRows(filtered);
    };

          <button onclick="window.closeModal()" class="text-muted-foreground hover:text-foreground"><i class="fa-solid fa-xmark text-xl"></i></button>
        </div>
        <div class="p-6 space-y-4">
          <div class="grid grid-cols-2 gap-4">
            <div>
              <label class="block text-sm font-medium mb-1">Expense Type <span class="text-destructive">*</span></label>

                  <input type="radio" name="exp-type-radio" id="exp-type-rca" value="RCA" class="hidden" ${defaultType==='RCA'?'checked':''} onchange="document.getElementById('exp-type-sel').value='RCA';document.querySelectorAll('[name=exp-type-radio]').forEach((r,i)=>{r.closest('label').className=r.checked?'flex-1 flex items-center justify-center gap-2 p-3 rounded-xl border-2 cursor-pointer transition-all border-blue-500 bg-blue-50 dark:bg-blue-900/20':'flex-1 flex items-center justify-center gap-2 p-3 rounded-xl border-2 cursor-pointer transition-all border-border hover:border-blue-300'})">

                <label class="flex-1 flex items-center justify-center gap-2 p-3 rounded-xl border-2 cursor-pointer transition-all ${defaultType==='VALE'?'border-purple-500 bg-purple-50 dark:bg-purple-900/20':'border-border hover:border-purple-300'}">
                  <input type="radio" name="exp-type-radio" id="exp-type-vale" value="VALE" class="hidden" ${defaultType==='VALE'?'checked':''} onchange="document.getElementById('exp-type-sel').value='VALE';document.querySelectorAll('[name=exp-type-radio]').forEach((r,i)=>{r.closest('label').className=r.checked?'flex-1 flex items-center justify-center gap-2 p-3 rounded-xl border-2 cursor-pointer transition-all border-purple-500 bg-purple-50 dark:bg-purple-900/20':'flex-1 flex items-center justify-center gap-2 p-3 rounded-xl border-2 cursor-pointer transition-all border-border hover:border-purple-300'})">
                  <span class="font-bold text-sm">📋 VALE</span>
                </label>
              </div>
              <input type="hidden" id="exp-type-sel" value="${defaultType}">

            <div>
              <label class="block text-sm font-medium mb-1">Date <span class="text-destructive">*</span></label>

            <div class="col-span-2">
              <label class="block text-sm font-medium mb-1">Particulars <span class="text-destructive">*</span></label>
              <input id="exp-particulars" value="${e?.particulars||''}" class="w-full h-10 px-3 rounded-xl border border-input bg-background text-sm" placeholder="e.g. Field Visit to Batangas · Office Supplies · Staff Meeting">

            <div class="col-span-2">
              <label class="block text-sm font-medium mb-1">Description</label>
              <input id="exp-desc" value="${e?.description||''}" class="w-full h-10 px-3 rounded-xl border border-input bg-background text-sm" placeholder="Additional details about this expense...">
            </div>
            <div>
              <label class="block text-sm font-medium mb-1">Budget / Cash Advance (₱) <span class="text-destructive">*</span></label>
